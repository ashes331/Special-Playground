<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>voice changer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #181818;
    --border: rgba(255,255,255,0.08);
    --border-active: rgba(255,255,255,0.18);
    --text: #f0f0f0;
    --text-muted: #666;
    --accent: #00e5a0;
    --accent-dim: rgba(0,229,160,0.12);
    --accent-dim2: rgba(0,229,160,0.06);
    --danger: #ff4d4d;
    --danger-dim: rgba(255,77,77,0.12);
    --mono: 'Space Mono', monospace;
    --sans: 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 24px 80px;
  }

  .wordmark {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.25em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 48px;
    align-self: flex-start;
  }

  .center-col {
    width: 100%;
    max-width: 560px;
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 700;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--text);
    margin-bottom: 8px;
  }
  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 40px;
    font-family: var(--mono);
  }

  /* VIZ */
  .viz-wrap {
    position: relative;
    height: 72px;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 28px;
  }
  #waveform { width: 100%; height: 100%; display: block; }
  .viz-label {
    position: absolute;
    top: 8px; right: 10px;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* STATUS */
  .status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .led {
    width: 7px; height: 7px; border-radius: 50%;
    background: #333; flex-shrink: 0;
    transition: background 0.3s, box-shadow 0.3s;
  }
  .led.on { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .led.err { background: var(--danger); box-shadow: 0 0 6px var(--danger); }

  /* PRESETS */
  .section-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .preset-btn {
    font-family: var(--mono);
    font-size: 11px;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: var(--border-active); color: var(--text); }
  .preset-btn.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }

  /* CONTROLS */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 28px;
  }
  .ctrl-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
  }
  .ctrl-card.wide { grid-column: 1 / -1; }
  .ctrl-name {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .ctrl-name .val {
    color: var(--accent);
    font-size: 11px;
    letter-spacing: 0;
    min-width: 50px;
    text-align: right;
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 2px;
    background: var(--border-active);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    border: none;
    cursor: pointer;
    transition: transform 0.1s;
  }
  input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.3); }

  /* TOGGLE ROW */
  .toggle-rows { display: flex; flex-direction: column; gap: 10px; }
  .t-row { display: flex; justify-content: space-between; align-items: center; }
  .t-label { font-size: 12px; color: var(--text); font-family: var(--mono); }

  .toggle-wrap { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
  .toggle-wrap input { opacity: 0; width: 0; height: 0; position: absolute; }
  .tog-track {
    position: absolute; inset: 0;
    background: var(--border-active);
    border-radius: 20px; cursor: pointer;
    transition: background 0.2s;
  }
  .tog-track::before {
    content: '';
    position: absolute;
    width: 14px; height: 14px;
    background: #555;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle-wrap input:checked + .tog-track { background: var(--accent-dim); }
  .toggle-wrap input:checked + .tog-track::before { transform: translateX(16px); background: var(--accent); }

  /* MAIN BUTTON */
  .main-btn {
    width: 100%;
    padding: 16px;
    border-radius: 6px;
    font-family: var(--mono);
    font-size: 13px;
    letter-spacing: 0.1em;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-transform: uppercase;
  }
  .main-btn.start {
    background: var(--accent-dim);
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  .main-btn.start:hover { background: rgba(0,229,160,0.2); }
  .main-btn.stop {
    background: var(--danger-dim);
    color: var(--danger);
    border: 1px solid var(--danger);
  }
  .main-btn.stop:hover { background: rgba(255,77,77,0.2); }

  /* PITCH GRID */
  .pitch-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 10px;
  }
  .pitch-step {
    text-align: center;
    font-family: var(--mono);
    font-size: 9px;
    padding: 5px 2px;
    border: 1px solid var(--border);
    border-radius: 3px;
    cursor: pointer;
    color: var(--text-muted);
    transition: all 0.12s;
    user-select: none;
  }
  .pitch-step:hover { border-color: var(--border-active); color: var(--text); }
  .pitch-step.active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim2); }

  @media (max-width: 480px) {
    .controls { grid-template-columns: 1fr; }
    .ctrl-card.wide { grid-column: 1; }
  }
</style>
</head>
<body>

<div class="wordmark">voice-changer / v1.0</div>

<div class="center-col">
  <h1>voice<br><span>changer</span></h1>
  <p class="subtitle">web audio api &mdash; no server, runs in browser</p>

  <div class="viz-wrap">
    <canvas id="waveform"></canvas>
    <div class="viz-label" id="viz-label">IDLE</div>
  </div>

  <div class="status-row">
    <div class="led" id="led"></div>
    <span id="status-text">마이크 버튼을 눌러 시작하세요</span>
  </div>

  <div class="section-label">preset</div>
  <div class="presets">
    <button class="preset-btn" data-preset="robot">robot</button>
    <button class="preset-btn" data-preset="helium">helium</button>
    <button class="preset-btn" data-preset="demon">demon</button>
    <button class="preset-btn" data-preset="telephone">telephone</button>
    <button class="preset-btn" data-preset="cave">cave</button>
    <button class="preset-btn" data-preset="chipmunk">chipmunk</button>
    <button class="preset-btn" data-preset="original">original</button>
  </div>

  <div class="section-label">controls</div>
  <div class="controls">

    <div class="ctrl-card wide">
      <div class="ctrl-name">pitch <span class="val" id="pitch-val">0 semitones</span></div>
      <input type="range" id="pitch-slider" min="-12" max="12" step="1" value="0">
      <div class="pitch-grid" id="pitch-grid"></div>
    </div>

    <div class="ctrl-card">
      <div class="ctrl-name">echo delay <span class="val" id="delay-val">0.00 s</span></div>
      <input type="range" id="delay-slider" min="0" max="0.8" step="0.01" value="0">
    </div>

    <div class="ctrl-card">
      <div class="ctrl-name">echo feedback <span class="val" id="feedback-val">0%</span></div>
      <input type="range" id="feedback-slider" min="0" max="0.85" step="0.01" value="0">
    </div>

    <div class="ctrl-card">
      <div class="ctrl-name">reverb mix <span class="val" id="reverb-val">0%</span></div>
      <input type="range" id="reverb-slider" min="0" max="1" step="0.01" value="0">
    </div>

    <div class="ctrl-card">
      <div class="ctrl-name">output gain <span class="val" id="gain-val">1.0×</span></div>
      <input type="range" id="gain-slider" min="0.1" max="3.0" step="0.05" value="1.0">
    </div>

    <div class="ctrl-card wide">
      <div class="ctrl-name">effects</div>
      <div class="toggle-rows">
        <div class="t-row">
          <span class="t-label">lo-fi filter (3kHz cutoff)</span>
          <label class="toggle-wrap"><input type="checkbox" id="lofi-toggle"><div class="tog-track"></div></label>
        </div>
        <div class="t-row">
          <span class="t-label">ring modulator (robot voice)</span>
          <label class="toggle-wrap"><input type="checkbox" id="ring-toggle"><div class="tog-track"></div></label>
        </div>
        <div class="t-row">
          <span class="t-label">noise gate (배경 소음 제거)</span>
          <label class="toggle-wrap"><input type="checkbox" id="gate-toggle"><div class="tog-track"></div></label>
        </div>
      </div>
    </div>

  </div>

  <button class="main-btn start" id="main-btn" onclick="toggleStream()">
    &#9679; start microphone
  </button>
</div>

<script>
// ─── state ───────────────────────────────────────────────
const S = {
  pitch: 0, delay: 0, feedback: 0, reverb: 0, gain: 1.0,
  lofi: false, ring: false, gate: false,
  running: false
};

// ─── pitch grid ──────────────────────────────────────────
const pitchSteps = [-12,-7,-5,-3,-2,0,2,3,5,7,10,12,14];
const pitchGrid = document.getElementById('pitch-grid');
// Use fixed set for the visual grid
const GRID_VALS = [-12,-7,-5,-2,0,2,5,7];
GRID_VALS.forEach(v => {
  const el = document.createElement('div');
  el.className = 'pitch-step' + (v === 0 ? ' active' : '');
  el.textContent = (v > 0 ? '+' : '') + v;
  el.dataset.v = v;
  el.onclick = () => {
    document.querySelectorAll('.pitch-step').forEach(e => e.classList.remove('active'));
    el.classList.add('active');
    S.pitch = v;
    document.getElementById('pitch-slider').value = v;
    document.getElementById('pitch-val').textContent = v + ' semitones';
    clearPreset();
    if (S.running) rebuildGraph();
  };
  pitchGrid.appendChild(el);
});

// ─── sliders ─────────────────────────────────────────────
function bindSlider(id, key, fmt, cb) {
  document.getElementById(id).addEventListener('input', e => {
    S[key] = parseFloat(e.target.value);
    document.getElementById(id.replace('slider','val')).textContent = fmt(S[key]);
    clearPreset();
    if (cb) cb();
    if (S.running) rebuildGraph();
  });
}
bindSlider('pitch-slider','pitch', v => v+' semitones', () => {
  document.querySelectorAll('.pitch-step').forEach(e => {
    e.classList.toggle('active', parseInt(e.dataset.v) === S.pitch);
  });
});
bindSlider('delay-slider','delay', v => v.toFixed(2)+' s');
bindSlider('feedback-slider','feedback', v => Math.round(v*100)+'%');
bindSlider('reverb-slider','reverb', v => Math.round(v*100)+'%');
bindSlider('gain-slider','gain', v => v.toFixed(2)+'×');

['lofi','ring','gate'].forEach(key => {
  document.getElementById(key+'-toggle').addEventListener('change', e => {
    S[key] = e.target.checked;
    clearPreset();
    if (S.running) rebuildGraph();
  });
});

// ─── presets ─────────────────────────────────────────────
const PRESETS = {
  robot:     { pitch:0,  delay:0.02, feedback:0.1, reverb:0.1, gain:1.0, lofi:false, ring:true,  gate:false },
  helium:    { pitch:7,  delay:0,    feedback:0,   reverb:0,   gain:1.2, lofi:false, ring:false, gate:false },
  demon:     { pitch:-7, delay:0.1,  feedback:0.3, reverb:0.3, gain:1.0, lofi:false, ring:false, gate:false },
  telephone: { pitch:0,  delay:0,    feedback:0,   reverb:0,   gain:1.0, lofi:true,  ring:false, gate:true  },
  cave:      { pitch:-2, delay:0.35, feedback:0.65,reverb:0.75,gain:1.0, lofi:false, ring:false, gate:false },
  chipmunk:  { pitch:10, delay:0,    feedback:0,   reverb:0.1, gain:1.0, lofi:false, ring:false, gate:false },
  original:  { pitch:0,  delay:0,    feedback:0,   reverb:0,   gain:1.0, lofi:false, ring:false, gate:false },
};

function applyPreset(name) {
  const p = PRESETS[name]; if (!p) return;
  Object.assign(S, p);
  syncUI();
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.toggle('active', b.dataset.preset === name));
  if (S.running) rebuildGraph();
}

function clearPreset() {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}

function syncUI() {
  document.getElementById('pitch-slider').value = S.pitch;
  document.getElementById('pitch-val').textContent = S.pitch + ' semitones';
  document.getElementById('delay-slider').value = S.delay;
  document.getElementById('delay-val').textContent = S.delay.toFixed(2) + ' s';
  document.getElementById('feedback-slider').value = S.feedback;
  document.getElementById('feedback-val').textContent = Math.round(S.feedback*100) + '%';
  document.getElementById('reverb-slider').value = S.reverb;
  document.getElementById('reverb-val').textContent = Math.round(S.reverb*100) + '%';
  document.getElementById('gain-slider').value = S.gain;
  document.getElementById('gain-val').textContent = S.gain.toFixed(2) + '×';
  document.getElementById('lofi-toggle').checked = S.lofi;
  document.getElementById('ring-toggle').checked = S.ring;
  document.getElementById('gate-toggle').checked = S.gate;
  document.querySelectorAll('.pitch-step').forEach(e => {
    e.classList.toggle('active', parseInt(e.dataset.v) === S.pitch);
  });
}

document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => applyPreset(btn.dataset.preset));
});

// ─── audio graph ─────────────────────────────────────────
let AC, mediaStream, source, analyser, animId;
let ringOsc;

function createImpulse(ac, dur, decay) {
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
  }
  return buf;
}

// Pitch shift via playbackRate on a buffer source (record → shift → play)
// For real-time: we use a script processor approach with a pitch approximation
// via delay-based pitch shift (simple but works for ±12 semitones)
function buildPitchShiftChain(ac, inputNode) {
  // Simple pitch shift: use a small buffer + playback rate trick
  // We'll use the "delay + feedback" approach for approximate pitch shift
  // Real phase vocoder needs AudioWorklet — this gives good results for ±7st
  const semitones = S.pitch;
  const ratio = Math.pow(2, semitones / 12);

  // Create a MediaStreamDestination to capture audio, then replay at different speed
  // For real-time, we use a combination of delay modulation (chorus-like pitch shift)
  if (semitones === 0) return inputNode;

  // Use a loopback: ScriptProcessorNode for time-stretch approximation
  const bufSize = 4096;
  const sp = ac.createScriptProcessor(bufSize, 1, 1);

  // Circular buffer approach
  const circBuf = new Float32Array(ac.sampleRate * 2);
  let writeIdx = 0;
  let readIdx = 0;
  const rateRatio = ratio;

  sp.onaudioprocess = (e) => {
    const inp = e.inputBuffer.getChannelData(0);
    const out = e.outputBuffer.getChannelData(0);
    const N = inp.length;
    const bufLen = circBuf.length;

    for (let i = 0; i < N; i++) {
      circBuf[writeIdx % bufLen] = inp[i];
      writeIdx++;
    }

    for (let i = 0; i < N; i++) {
      const ri = readIdx + i * rateRatio;
      const idx0 = Math.floor(ri) % bufLen;
      const idx1 = (idx0 + 1) % bufLen;
      const frac = ri - Math.floor(ri);
      // linear interpolation
      out[i] = circBuf[idx0] * (1 - frac) + circBuf[idx1] * frac;
    }
    readIdx += N * rateRatio;
  };

  inputNode.connect(sp);
  const spOut = ac.createGain();
  sp.connect(spOut);
  return spOut;
}

function rebuildGraph() {
  if (ringOsc) { try { ringOsc.stop(); } catch(e){} ringOsc = null; }

  analyser = AC.createAnalyser();
  analyser.fftSize = 2048;

  // ─ noise gate ─
  let chain = source;
  if (S.gate) {
    const comp = AC.createDynamicsCompressor();
    comp.threshold.value = -50;
    comp.knee.value = 10;
    comp.ratio.value = 20;
    comp.attack.value = 0.001;
    comp.release.value = 0.1;
    chain.connect(comp);
    chain = comp;
  }

  // ─ ring mod ─
  if (S.ring) {
    ringOsc = AC.createOscillator();
    ringOsc.frequency.value = 40;
    const ringGain = AC.createGain();
    ringGain.gain.value = 0;
    ringOsc.connect(ringGain.gain);
    ringOsc.start();
    const ringInput = AC.createGain();
    chain.connect(ringInput);
    ringInput.connect(ringGain);
    chain = ringGain;
  }

  // ─ pitch shift ─
  chain = buildPitchShiftChain(AC, chain);

  // ─ lo-fi ─
  const lpf = AC.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = S.lofi ? 3000 : 20000;
  chain.connect(lpf);
  chain = lpf;

  // ─ echo ─
  const delay = AC.createDelay(2.0);
  delay.delayTime.value = S.delay;
  const fb = AC.createGain();
  fb.gain.value = S.feedback;
  const delayMix = AC.createGain();
  delayMix.gain.value = S.delay > 0 ? 0.5 : 0;

  chain.connect(delay);
  delay.connect(fb);
  fb.connect(delay);
  delay.connect(delayMix);

  // ─ reverb ─
  const convolver = AC.createConvolver();
  convolver.buffer = createImpulse(AC, 2.5, 3.5);
  const reverbWet = AC.createGain();
  reverbWet.gain.value = S.reverb;
  const reverbDry = AC.createGain();
  reverbDry.gain.value = 1 - S.reverb;
  chain.connect(convolver);
  convolver.connect(reverbWet);
  chain.connect(reverbDry);

  // ─ output ─
  const out = AC.createGain();
  out.gain.value = S.gain;
  reverbDry.connect(out);
  reverbWet.connect(out);
  delayMix.connect(out);
  out.connect(analyser);
  out.connect(AC.destination);
}

// ─── stream control ──────────────────────────────────────
async function toggleStream() {
  if (!S.running) await startStream(); else stopStream();
}

async function startStream() {
  try {
    mediaStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false }, video: false });
  } catch (err) {
    setStatus('마이크 접근 거부됨: ' + err.message, 'err');
    return;
  }
  AC = new (window.AudioContext || window.webkitAudioContext)();
  source = AC.createMediaStreamSource(mediaStream);
  rebuildGraph();
  S.running = true;
  const btn = document.getElementById('main-btn');
  btn.textContent = '■ stop';
  btn.className = 'main-btn stop';
  setStatus('실행 중 — 헤드폰 사용 권장 (피드백 방지)', 'on');
  document.getElementById('viz-label').textContent = 'LIVE';
  startViz();
}

function stopStream() {
  if (ringOsc) { try { ringOsc.stop(); } catch(e){} ringOsc = null; }
  if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
  if (AC) { AC.close(); AC = null; }
  if (animId) { cancelAnimationFrame(animId); animId = null; }
  S.running = false;
  const btn = document.getElementById('main-btn');
  btn.innerHTML = '&#9679; start microphone';
  btn.className = 'main-btn start';
  setStatus('마이크 버튼을 눌러 시작하세요', '');
  document.getElementById('viz-label').textContent = 'IDLE';
  const c = document.getElementById('waveform');
  const ctx2 = c.getContext('2d');
  ctx2.clearRect(0, 0, c.width, c.height);
}

function setStatus(msg, type) {
  document.getElementById('status-text').textContent = msg;
  const led = document.getElementById('led');
  led.className = 'led' + (type ? ' '+type : '');
}

// ─── waveform viz ────────────────────────────────────────
function startViz() {
  const canvas = document.getElementById('waveform');
  const ctx2 = canvas.getContext('2d');
  function draw() {
    if (!S.running || !analyser) return;
    animId = requestAnimationFrame(draw);
    const W = canvas.width = canvas.offsetWidth;
    const H = canvas.height = canvas.offsetHeight;
    ctx2.clearRect(0, 0, W, H);
    const buf = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(buf);
    ctx2.beginPath();
    ctx2.strokeStyle = '#00e5a0';
    ctx2.lineWidth = 1.5;
    const step = W / buf.length;
    for (let i = 0; i < buf.length; i++) {
      const y = (buf[i] / 128) * H / 2;
      i === 0 ? ctx2.moveTo(0, y) : ctx2.lineTo(i * step, y);
    }
    ctx2.stroke();
  }
  draw();
}
</script>
