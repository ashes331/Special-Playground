<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Translator — Special Playground</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header class="header">
  <div class="header-left">
    <a class="back-btn" href="../">
      <span class="back-arr">←</span>
      <span>Special Playground</span>
    </a>
    <span style="color:var(--border);font-size:14px;">/</span>
    <span class="header-title" id="headerTitle">Translator</span>
  </div>
  <div class="header-right">
    <span class="kbd-hint" id="kbdHint">L — 언어 전환 &nbsp;·&nbsp; Ctrl+Enter — 번역</span>
    <button class="lang-toggle" id="langToggle">KO</button>
  </div>
</header>

<main class="main">
  <div class="hero">
    <div class="hero-num">07 · TOOL</div>
    <h1 class="hero-title" id="heroTitle">Multi-<span>language</span><br>Translator</h1>
    <p class="hero-desc" id="heroDesc">MyMemory API 기반 · 16개 언어 지원</p>
  </div>

  <div class="lang-row">
    <select class="lang-select" id="srcLang"></select>
    <button class="swap-btn" id="swapBtn" title="언어 교체">⇄</button>
    <select class="lang-select" id="tgtLang"></select>
  </div>

  <div class="panels">
    <div class="panel" id="srcPanel">
      <div class="panel-header">
        <span class="panel-lang-label" id="srcLabel">한국어</span>
        <span class="char-count" id="charCount">0</span>
      </div>
      <textarea class="panel-textarea" id="srcText" maxlength="5000"></textarea>
      <div class="panel-footer">
        <span></span>
        <button class="icon-btn" id="clearBtn">
          <span>✕</span>
          <span id="clearTxt">지우기</span>
        </button>
      </div>
    </div>

    <div class="panel" id="tgtPanel">
      <div class="panel-header">
        <span class="panel-lang-label" id="tgtLabel">영어</span>
        <span class="detected-badge" id="detectedBadge"></span>
      </div>
      <div class="output-box" id="outputBox">
        <span class="output-placeholder" id="outputPlaceholder">번역 결과가 여기에 표시됩니다</span>
      </div>
      <div class="panel-footer">
        <span></span>
        <button class="icon-btn" id="copyBtn" style="display:none;">
          <span>⎘</span>
          <span id="copyTxt">복사</span>
        </button>
      </div>
    </div>
  </div>

  <div class="translate-wrap">
    <button class="translate-btn" id="translateBtn">
      <span id="translateBtnTxt">번역하기</span>
    </button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <footer class="footer">
    <span class="footer-text">SPECIAL PLAYGROUND · 07</span>
    <span class="footer-note" id="footerNote">Powered by MyMemory API</span>
  </footer>
</main>

<script src="js/main.js"></script>
</body>
</html>
