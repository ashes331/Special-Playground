<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>확률 도구 모음</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #fdf8f4;
    --surface: #ffffff;
    --border: #ede6f0;
    --purple: #7c4dca;
    --purple-light: #f0ebff;
    --purple-mid: #c9b3f0;
    --purple-dark: #5a32a3;
    --text: #2a1f3d;
    --text-muted: #8b7fa8;
    --gold-1: #fff7c0;
    --gold-2: #f5c842;
    --gold-3: #b8860b;
    --gold-rim: #8B6914;
    --gold-stroke: #c8961a;
    --radius: 16px;
    --radius-sm: 10px;
    --radius-pill: 999px;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem 4rem;
  }

  header {
    text-align: center;
    margin-bottom: 2rem;
  }
  header h1 {
    font-size: 2rem;
    font-weight: 600;
    color: var(--purple-dark);
    letter-spacing: -0.5px;
  }
  header p {
    font-size: 0.95rem;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .container {
    width: 100%;
    max-width: 600px;
  }

  /* ════════════════════════════
     공통 레이아웃
     ════════════════════════════ */

  /* TABS */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .tab-btn {
    padding: 9px 20px;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--border);
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    background: var(--surface);
    color: var(--text-muted);
    transition: all 0.18s;
  }
  .tab-btn:hover { background: var(--purple-light); border-color: var(--purple-mid); color: var(--purple); }
  .tab-btn.active { background: var(--purple-light); border-color: var(--purple-mid); color: var(--purple); }

  /* PANEL */
  .panel { display: none; }
  .panel.active { display: block; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2rem;
  }

  /* BUTTON */
  .btn {
    padding: 11px 32px;
    border-radius: var(--radius-pill);
    background: var(--purple-light);
    border: 1.5px solid var(--purple-mid);
    color: var(--purple);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn:hover { background: #e4d8ff; }
  .btn:active { transform: scale(0.97); }
  .btn-sm {
    padding: 7px 16px;
    font-size: 13px;
  }

  /* ════════════════════════════
     동전 던지기
     ════════════════════════════ */
  .coin-layout {
    display: flex;
    gap: 2rem;
    align-items: flex-start;
  }
  .coin-legend {
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding-top: 8px;
  }
  .legend-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }
  .legend-label {
    font-size: 11px;
    color: var(--text-muted);
  }
  .coin-main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
  }
  .coin-svg {
    cursor: pointer;
    filter: drop-shadow(0 4px 10px rgba(180,140,0,0.3));
    transition: transform 0.08s;
  }
  .coin-svg:active { transform: scale(0.93); }
  .coin-svg.flip { animation: coinFlip 0.7s ease; }
  @keyframes coinFlip {
    0%   { transform: rotateY(0deg) scale(1); }
    25%  { transform: rotateY(90deg) scale(0.8); }
    50%  { transform: rotateY(180deg) scale(1); }
    75%  { transform: rotateY(270deg) scale(0.8); }
    100% { transform: rotateY(360deg) scale(1); }
  }
  .coin-result {
    font-size: 18px;
    font-weight: 500;
    color: var(--purple);
    min-height: 26px;
  }
  .coin-stats {
    display: flex;
    gap: 28px;
  }
  .coin-stat { text-align: center; }
  .coin-stat .num { font-size: 24px; font-weight: 600; color: var(--purple); }
  .coin-stat .lbl { font-size: 12px; color: var(--text-muted); margin-top: 2px; }

  /* ════════════════════════════
     주사위 굴리기
     ════════════════════════════ */
  .dice-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  .dice-type-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .dice-type-btn {
    padding: 6px 16px;
    border-radius: var(--radius-pill);
    border: 1.5px solid var(--purple-mid);
    background: var(--purple-light);
    color: var(--purple);
    font-family: 'Outfit', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .dice-type-btn.active { background: var(--purple); color: #fff; border-color: var(--purple); }
  .dice-count-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .dice-count-row button {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1.5px solid var(--purple-mid);
    background: var(--purple-light);
    color: var(--purple);
    font-size: 18px;
    cursor: pointer;
    transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .dice-count-row button:hover { background: #e4d8ff; }
  .dice-count-val { font-size: 17px; font-weight: 500; color: var(--purple); min-width: 20px; text-align: center; }
  .dice-display {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 64px;
    align-items: center;
  }
  .die {
    width: 58px; height: 58px;
    border-radius: 14px;
    background: var(--purple-light);
    border: 2px solid var(--purple-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600; color: var(--purple);
  }
  .die.roll { animation: dieShake 0.5s ease; }
  @keyframes dieShake {
    0%,100% { transform: rotate(0deg); }
    20% { transform: rotate(-12deg) scale(1.1); }
    40% { transform: rotate(12deg) scale(0.95); }
    60% { transform: rotate(-8deg) scale(1.05); }
    80% { transform: rotate(6deg) scale(0.98); }
  }
  .dice-total { font-size: 15px; color: var(--text-muted); }
  .dice-total span { font-weight: 600; color: var(--purple); }

  /* ════════════════════════════
     숫자 뽑기
     ════════════════════════════ */
  .num-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }
  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .range-row label { font-size: 14px; color: var(--text-muted); }
  .range-row input[type=number] {
    width: 84px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--purple-mid);
    background: var(--purple-light);
    font-family: 'Outfit', sans-serif;
    font-size: 15px;
    color: var(--purple);
    text-align: center;
    outline: none;
  }
  .range-row input[type=number]:focus { border-color: var(--purple); }
  .range-sep { font-size: 14px; color: var(--text-muted); }
  .num-result {
    font-size: 72px;
    font-weight: 600;
    color: var(--purple);
    min-height: 88px;
    line-height: 1;
    display: flex;
    align-items: center;
  }
  .num-result.pop { animation: numPop 0.35s cubic-bezier(.36,.07,.19,.97); }
  @keyframes numPop {
    0%   { transform: scale(0.5); opacity: 0.3; }
    70%  { transform: scale(1.15); }
    100% { transform: scale(1); opacity: 1; }
  }
  .num-history {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    min-height: 28px;
  }
  .num-chip {
    padding: 3px 12px;
    border-radius: var(--radius-pill);
    background: var(--purple-light);
    color: var(--purple);
    font-size: 13px;
    border: 1px solid var(--purple-mid);
  }

  /* ── LADDER ── */
  .ladder-hint { font-size: 13px; color: var(--text-muted); margin-bottom: 0.75rem; }
  .ladder-count-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .ladder-count-btn {
    width: 44px; height: 44px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--purple-mid);
    background: var(--purple-light);
    color: var(--purple);
    font-family: 'Outfit', sans-serif;
    font-size: 16px; font-weight: 500;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .ladder-count-btn:hover { background: #e4d8ff; }
  .ladder-name-row { display: flex; gap: 0; justify-content: space-around; padding: 0 4px; }
  .ladder-name-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
  .ladder-name-wrap input {
    text-align: center;
    font-family: 'Outfit', sans-serif;
    font-size: 13px; font-weight: 500;
    border: 1.5px solid var(--purple-mid);
    border-radius: var(--radius-sm);
    background: var(--purple-light);
    color: var(--purple); outline: none;
    padding: 5px 4px; width: 64px;
  }
  .ladder-name-wrap input:focus { border-color: var(--purple); }
  .ladder-name-idx { font-size: 11px; color: var(--text-muted); }
  #ladderCanvas { width: 100%; border-radius: var(--radius-sm); display: block; }
  .ladder-results { display: flex; gap: 8px; flex-wrap: wrap; }
  .ladder-result-chip {
    padding: 6px 16px;
    border-radius: var(--radius-pill);
    font-size: 13px; font-weight: 500; border: 1.5px solid;
  }

  .center-row {
    display: flex;
    justify-content: center;
    margin-top: 0.5rem;
  }
</style>
</head>
<body>

<header>
  <h1>🎲 확률 도구 모음</h1>
  <p>동전, 주사위, 숫자, 사다리 — 뽑기가 필요할 때</p>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('coin')">🪙 동전 던지기</button>
    <button class="tab-btn" onclick="switchTab('dice')">🎲 주사위 굴리기</button>
    <button class="tab-btn" onclick="switchTab('number')">🔢 숫자 뽑기</button>
    <button class="tab-btn" onclick="switchTab('ladder')">🪜 사다리타기</button>
  </div>

  <!-- ============================================================
       동전 던지기 패널
       - 앞면(👑) / 뒷면(⭐) SVG 동전
       - 좌측 범례 (앞면/뒷면 미리보기)
       - 클릭 시 flip 애니메이션 + 카운트 집계
       ============================================================ -->
  <!-- COIN -->
  <div class="panel active card" id="panel-coin">
    <div class="coin-layout">
      <div class="coin-legend">
        <div class="legend-item">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <defs>
              <radialGradient id="gH" cx="38%" cy="32%">
                <stop offset="0%" stop-color="#fff7c0"/>
                <stop offset="40%" stop-color="#f5c842"/>
                <stop offset="100%" stop-color="#b8860b"/>
              </radialGradient>
              <radialGradient id="rH" cx="50%" cy="50%">
                <stop offset="70%" stop-color="transparent"/>
                <stop offset="100%" stop-color="#8B6914"/>
              </radialGradient>
            </defs>
            <circle cx="28" cy="28" r="26" fill="url(#gH)" stroke="#c8961a" stroke-width="2"/>
            <circle cx="28" cy="28" r="26" fill="url(#rH)"/>
            <text x="28" y="35" text-anchor="middle" font-size="22" fill="#7a5200">👑</text>
          </svg>
          <span class="legend-label">앞면</span>
        </div>
        <div class="legend-item">
          <svg width="56" height="56" viewBox="0 0 56 56">
            <defs>
              <radialGradient id="gT" cx="38%" cy="32%">
                <stop offset="0%" stop-color="#fff7c0"/>
                <stop offset="40%" stop-color="#f5c842"/>
                <stop offset="100%" stop-color="#b8860b"/>
              </radialGradient>
              <radialGradient id="rT" cx="50%" cy="50%">
                <stop offset="70%" stop-color="transparent"/>
                <stop offset="100%" stop-color="#8B6914"/>
              </radialGradient>
            </defs>
            <circle cx="28" cy="28" r="26" fill="url(#gT)" stroke="#c8961a" stroke-width="2"/>
            <circle cx="28" cy="28" r="26" fill="url(#rT)"/>
            <text x="28" y="35" text-anchor="middle" font-size="22" fill="#7a5200">⭐</text>
          </svg>
          <span class="legend-label">뒷면</span>
        </div>
      </div>

      <div class="coin-main">
        <svg id="coinSvg" class="coin-svg" width="114" height="114" viewBox="0 0 114 114" onclick="flipCoin()">
          <defs>
            <radialGradient id="gM" cx="38%" cy="32%">
              <stop offset="0%" stop-color="#fff7c0"/>
              <stop offset="40%" stop-color="#f5c842"/>
              <stop offset="100%" stop-color="#b8860b"/>
            </radialGradient>
            <radialGradient id="rM" cx="50%" cy="50%">
              <stop offset="70%" stop-color="transparent"/>
              <stop offset="100%" stop-color="#8B6914"/>
            </radialGradient>
          </defs>
          <circle cx="57" cy="57" r="52" fill="url(#gM)" stroke="#c8961a" stroke-width="3"/>
          <circle cx="57" cy="57" r="52" fill="url(#rM)"/>
          <text id="coinSymbol" x="57" y="70" text-anchor="middle" font-size="42" fill="#7a5200">👑</text>
        </svg>
        <div class="coin-result" id="coinResult">눌러서 던지기</div>
        <div class="coin-stats">
          <div class="coin-stat">
            <div class="num" id="headCount">0</div>
            <div class="lbl">앞면 👑</div>
          </div>
          <div class="coin-stat">
            <div class="num" id="totalCount">0</div>
            <div class="lbl">총 횟수</div>
          </div>
          <div class="coin-stat">
            <div class="num" id="tailCount">0</div>
            <div class="lbl">뒷면 ⭐</div>
          </div>
        </div>
        <button class="btn btn-sm" onclick="resetCoin()">초기화</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       주사위 굴리기 패널
       - 다면체 선택 (d4 / d6 / d8 / d10 / d12 / d20)
       - 주사위 개수 조절 (최대 6개), 합계 표시
       - 굴리기 시 shake 애니메이션
       ============================================================ -->
  <!-- DICE -->
  <div class="panel card" id="panel-dice">
    <div class="dice-wrap">
      <div class="dice-type-row">
        <button class="dice-type-btn active" onclick="setDiceType(this,4)">d4</button>
        <button class="dice-type-btn" onclick="setDiceType(this,6)">d6</button>
        <button class="dice-type-btn" onclick="setDiceType(this,8)">d8</button>
        <button class="dice-type-btn" onclick="setDiceType(this,10)">d10</button>
        <button class="dice-type-btn" onclick="setDiceType(this,12)">d12</button>
        <button class="dice-type-btn" onclick="setDiceType(this,20)">d20</button>
      </div>
      <div class="dice-count-row">
        <button onclick="changeDiceCount(-1)">−</button>
        <span class="dice-count-val" id="diceCountVal">1</span>
        <button onclick="changeDiceCount(1)">+</button>
        <span style="font-size:13px;color:var(--text-muted)">개</span>
      </div>
      <div class="dice-display" id="diceDisplay">
        <div class="die" id="die0">?</div>
      </div>
      <div class="dice-total" id="diceTotal"></div>
      <div class="center-row">
        <button class="btn" onclick="rollDice()">굴리기</button>
      </div>
    </div>
  </div>

  <!-- ============================================================
       숫자 뽑기 패널
       - 최솟값 / 최댓값 범위 지정
       - 결과 숫자 pop 애니메이션
       - 최근 뽑기 기록 최대 7개 표시
       ============================================================ -->
  <!-- NUMBER -->
  <div class="panel card" id="panel-number">
    <div class="num-wrap">
      <div class="range-row">
        <label>최솟값</label>
        <input type="number" id="numMin" value="1">
        <span class="range-sep">~</span>
        <label>최댓값</label>
        <input type="number" id="numMax" value="100">
      </div>
      <div class="num-result" id="numResult">?</div>
      <div class="num-history" id="numHistory"></div>
      <button class="btn" onclick="pickNumber()">뽑기</button>
    </div>
  </div>

  <!-- ============================================================
       사다리타기 패널
       - step1: 인원 수 버튼으로 선택 (2~8명)
       - step2: 사다리 미리 표시 (가지 숨김) + 이름 입력칸
       - 시작 버튼 → 가지 공개 + 경로 애니메이션
       - 결과는 1등부터 순서대로 표시
       ============================================================ -->
  <!-- LADDER -->
  <div class="panel card" id="panel-ladder">

    <!-- step 1: 인원 수 선택 -->
    <div id="ladderStep1">
      <p class="ladder-hint">몇 명이 참가하나요?</p>
      <div class="ladder-count-btns" id="ladderCountBtns"></div>
    </div>

    <!-- step 2: 사다리 + 이름 입력 -->
    <div id="ladderStep2" style="display:none; flex-direction:column; gap:12px;">
      <div class="ladder-name-row" id="ladderNameRow"></div>
      <canvas id="ladderCanvas"></canvas>
      <div class="ladder-results" id="ladderResults"></div>
      <div class="center-row" style="gap:8px;">
        <button class="btn" id="startLadderBtn" onclick="startLadder()">시작</button>
        <button class="btn" style="background:var(--color-background-secondary,#f5f5f5);border-color:var(--border);color:var(--text-muted);" onclick="resetLadder()">다시하기</button>
      </div>
    </div>

  </div>
</div>

<script>
/* ════════════════════════════
   공통 - 탭 전환
   ════════════════════════════ */
function switchTab(t) {
  const keys = ['coin','dice','number','ladder'];
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', keys[i]===t));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
}

/* ════════════════════════════
   동전 던지기
   - flipCoin()  : 애니메이션 + 앞/뒷면 판정
   - resetCoin() : 카운트 초기화
   ════════════════════════════ */
/* ── COIN ── */
let heads=0, tails=0;
function flipCoin() {
  const svg = document.getElementById('coinSvg');
  svg.classList.remove('flip');
  void svg.offsetWidth;
  svg.classList.add('flip');
  setTimeout(() => {
    const r = Math.random() < 0.5;
    document.getElementById('coinSymbol').textContent = r ? '👑' : '⭐';
    document.getElementById('coinResult').textContent = r ? '앞면 👑' : '뒷면 ⭐';
    if (r) heads++; else tails++;
    document.getElementById('headCount').textContent = heads;
    document.getElementById('tailCount').textContent = tails;
    document.getElementById('totalCount').textContent = heads + tails;
  }, 350);
}
function resetCoin() {
  heads = tails = 0;
  document.getElementById('coinSymbol').textContent = '👑';
  document.getElementById('coinResult').textContent = '눌러서 던지기';
  ['headCount','tailCount','totalCount'].forEach(id => document.getElementById(id).textContent = 0);
}

/* ════════════════════════════
   주사위 굴리기
   - setDiceType()    : 다면체 선택
   - changeDiceCount(): 주사위 개수 조절
   - rollDice()       : 굴리기 애니메이션 + 합계
   ════════════════════════════ */
/* ── DICE ── */
let diceType=4, diceCount=1;
function setDiceType(btn, t) {
  document.querySelectorAll('.dice-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  diceType = t;
}
function changeDiceCount(d) {
  diceCount = Math.max(1, Math.min(6, diceCount + d));
  document.getElementById('diceCountVal').textContent = diceCount;
  const disp = document.getElementById('diceDisplay');
  disp.innerHTML = '';
  for (let i=0; i<diceCount; i++) {
    const div = document.createElement('div');
    div.className = 'die'; div.id = 'die'+i; div.textContent = '?';
    disp.appendChild(div);
  }
  document.getElementById('diceTotal').textContent = '';
}
function rollDice() {
  const vals = [];
  for (let i=0; i<diceCount; i++) {
    const die = document.getElementById('die'+i);
    die.classList.remove('roll'); void die.offsetWidth; die.classList.add('roll');
    const v = Math.floor(Math.random()*diceType)+1;
    vals.push(v);
    setTimeout((d,v) => { d.textContent = v; }, 250, die, v);
  }
  setTimeout(() => {
    const tot = vals.reduce((a,b)=>a+b,0);
    document.getElementById('diceTotal').innerHTML = diceCount>1 ? `합계: <span>${tot}</span>` : '';
  }, 260);
}

/* ════════════════════════════
   숫자 뽑기
   - pickNumber() : 범위 내 랜덤 정수 생성 + 기록 유지
   ════════════════════════════ */
/* ── NUMBER ── */
let numHistory = [];
function pickNumber() {
  const mn = parseInt(document.getElementById('numMin').value);
  const mx = parseInt(document.getElementById('numMax').value);
  if (isNaN(mn)||isNaN(mx)||mn>mx) { document.getElementById('numResult').textContent='?'; return; }
  const v = Math.floor(Math.random()*(mx-mn+1))+mn;
  const el = document.getElementById('numResult');
  el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop');
  el.textContent = v;
  numHistory.unshift(v);
  if (numHistory.length > 8) numHistory.pop();
  document.getElementById('numHistory').innerHTML =
    numHistory.slice(1).map(n=>`<span class="num-chip">${n}</span>`).join('');
}

/* ════════════════════════════
   사다리타기
   - initLadderCountBtns() : 인원 수 버튼 생성
   - selectLadderCount()   : 인원 수 선택 → 사다리 빌드
   - generateRungs()       : 가지 생성 (열마다 최소 2개 보장)
   - buildLadder()         : 사다리 구조 계산 + 초기 렌더
   - buildLadderNameInputs(): 이름 입력칸 생성
   - drawLadder()          : Canvas 렌더러 (showRungs, progress)
   - startLadder()         : 가지 공개 + 경로 애니메이션
   - resetLadder()         : 초기 상태로 복원
   ════════════════════════════ */
let ladderN=0, ladderRungs=[], ladderPaths=[], ladderLabels=[], ladderResultMap={};
const LADDER_W=580, LADDER_H=320, LADDER_ROWS=6;

const PASTEL = [
  {bg:'#fde8f5',border:'#f0c0e0',text:'#b05090'},
  {bg:'#e8d8ff',border:'#c9b3f0',text:'#7c4dca'},
  {bg:'#d8f0ff',border:'#a8d8f8',text:'#2878b0'},
  {bg:'#d8f8e8',border:'#a0e0b8',text:'#287850'},
  {bg:'#fff0d8',border:'#f8d898',text:'#a06020'},
  {bg:'#ffd8d8',border:'#f8b0b0',text:'#b04040'},
  {bg:'#e0f0e0',border:'#b0d8b0',text:'#407040'},
  {bg:'#f8e8d0',border:'#e8c898',text:'#906030'},
];

function shuffle(a) {
  const b=[...a];
  for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}
  return b;
}

function generateRungs(n, rows) {
  const r=Array.from({length:rows},()=>Array(n-1).fill(false));
  for(let row=0;row<rows;row++){let c=0;while(c<n-1){if(Math.random()>0.4){r[row][c]=true;c+=2;}else c++;}}
  for(let col=0;col<n-1;col++){
    const cnt=r.reduce((s,row)=>s+(row[col]?1:0),0);
    if(cnt<2){
      const avail=[];
      for(let row=0;row<rows;row++){
        if(!r[row][col]&&(col===0||!r[row][col-1])&&(col>=n-2||!r[row][col+1])) avail.push(row);
      }
      shuffle(avail).slice(0,2-cnt).forEach(row=>{r[row][col]=true;});
    }
  }
  return r;
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.arcTo(x+w,y,x+w,y+r,r);
  ctx.lineTo(x+w,y+h-r);ctx.arcTo(x+w,y+h,x+w-r,y+h,r);ctx.lineTo(x+r,y+h);
  ctx.arcTo(x,y+h,x,y+h-r,r);ctx.lineTo(x,y+r);ctx.arcTo(x,y,x+r,y,r);ctx.closePath();
}

(function initLadderCountBtns(){
  const wrap=document.getElementById('ladderCountBtns');
  for(let i=2;i<=8;i++){
    const b=document.createElement('button');
    b.className='ladder-count-btn';b.textContent=i;
    b.onclick=()=>selectLadderCount(i);
    wrap.appendChild(b);
  }
})();

function selectLadderCount(num) {
  ladderN=num;
  document.getElementById('ladderStep1').style.display='none';
  document.getElementById('ladderStep2').style.display='flex';
  buildLadder();
}

function buildLadder() {
  const n=ladderN;
  const margin=44, top=56, bottom=LADDER_H-52;
  const colW=(LADDER_W-margin*2)/(n-1);
  const rowH=(bottom-top)/(LADDER_ROWS+1);

  ladderLabels=shuffle(Array.from({length:n},(_,i)=>`${i+1}등`));
  ladderRungs=generateRungs(n,LADDER_ROWS);

  ladderPaths=Array.from({length:n},(_,startCol)=>{
    let col=startCol;
    const pts=[{x:margin+col*colW,y:top}];
    for(let r=0;r<LADDER_ROWS;r++){
      const y=top+(r+1)*rowH;
      if(col>0&&ladderRungs[r][col-1]){pts.push({x:margin+col*colW,y});col--;pts.push({x:margin+col*colW,y});}
      else if(col<n-1&&ladderRungs[r][col]){pts.push({x:margin+col*colW,y});col++;pts.push({x:margin+col*colW,y});}
      else pts.push({x:margin+col*colW,y});
    }
    pts.push({x:margin+col*colW,y:bottom});
    return{pts,endCol:col};
  });

  ladderResultMap={};
  ladderPaths.forEach((p,i)=>{ladderResultMap[i]=ladderLabels[p.endCol];});

  buildLadderNameInputs(margin,colW);
  const canvas=document.getElementById('ladderCanvas');
  canvas.width=LADDER_W; canvas.height=LADDER_H;
  drawLadder(false);
  document.getElementById('ladderResults').innerHTML='';
  document.getElementById('startLadderBtn').disabled=false;
}

function buildLadderNameInputs(margin,colW) {
  const row=document.getElementById('ladderNameRow');
  row.innerHTML='';
  const cw=document.getElementById('ladderCanvas').offsetWidth||LADDER_W;
  for(let i=0;i<ladderN;i++){
    const wrap=document.createElement('div');
    wrap.className='ladder-name-wrap';
    wrap.style.width=Math.round(colW*(cw/LADDER_W))+'px';
    const inp=document.createElement('input');
    inp.type='text';inp.maxLength=5;inp.placeholder=(i+1)+'번';inp.id='lni'+i;
    const idx=document.createElement('span');
    idx.className='ladder-name-idx';idx.textContent=(i+1);
    wrap.appendChild(inp);wrap.appendChild(idx);
    row.appendChild(wrap);
  }
}

function drawLadder(showRungs, progress=1) {
  const canvas=document.getElementById('ladderCanvas');
  const ctx=canvas.getContext('2d');
  const n=ladderN;
  const margin=44,top=56,bottom=LADDER_H-52;
  const colW=(LADDER_W-margin*2)/(n-1);
  const rowH=(bottom-top)/(LADDER_ROWS+1);
  ctx.clearRect(0,0,LADDER_W,LADDER_H);

  for(let c=0;c<n;c++){
    ctx.beginPath();ctx.moveTo(margin+c*colW,top);ctx.lineTo(margin+c*colW,bottom);
    ctx.strokeStyle='#d4b3f0';ctx.lineWidth=2.5;ctx.stroke();
  }

  if(showRungs){
    for(let r=0;r<LADDER_ROWS;r++){
      for(let c=0;c<n-1;c++){
        if(ladderRungs[r][c]){
          const y=top+(r+1)*rowH;
          ctx.beginPath();ctx.moveTo(margin+c*colW,y);ctx.lineTo(margin+(c+1)*colW,y);
          ctx.strokeStyle='#c9b3f0';ctx.lineWidth=2;ctx.stroke();
        }
      }
    }
  }

  for(let c=0;c<n;c++){
    const x=margin+c*colW,p=PASTEL[c%PASTEL.length];
    const name=document.getElementById('lni'+c)?.value.trim()||(c+1)+'번';
    ctx.fillStyle=p.bg;rr(ctx,x-26,top-38,52,26,8);ctx.fill();
    ctx.strokeStyle=p.border;ctx.lineWidth=1.5;rr(ctx,x-26,top-38,52,26,8);ctx.stroke();
    ctx.fillStyle=p.text;ctx.font='500 12px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(name,x,top-25);
  }

  for(let c=0;c<n;c++){
    const x=margin+c*colW,p=PASTEL[c%PASTEL.length];
    ctx.fillStyle=p.bg;rr(ctx,x-26,bottom+10,52,26,8);ctx.fill();
    ctx.strokeStyle=p.border;ctx.lineWidth=1.5;rr(ctx,x-26,bottom+10,52,26,8);ctx.stroke();
    ctx.fillStyle=p.text;ctx.font='500 11px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ladderLabels[c],x,bottom+23);
  }

  if(showRungs&&progress>0){
    ladderPaths.forEach((path,i)=>{
      const p=PASTEL[i%PASTEL.length],pts=path.pts;
      let totalLen=0;const segs=[];
      for(let j=1;j<pts.length;j++){const dx=pts[j].x-pts[j-1].x,dy=pts[j].y-pts[j-1].y;segs.push(Math.sqrt(dx*dx+dy*dy));totalLen+=segs[segs.length-1];}
      const drawLen=totalLen*progress;let drawn=0;
      ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
      for(let j=0;j<segs.length;j++){
        const rem=drawLen-drawn;if(rem<=0)break;
        const t=Math.min(rem/segs[j],1);
        ctx.lineTo(pts[j].x+(pts[j+1].x-pts[j].x)*t,pts[j].y+(pts[j+1].y-pts[j].y)*t);
        drawn+=segs[j];if(drawn>=drawLen)break;
      }
      ctx.strokeStyle=p.border;ctx.lineWidth=3.5;ctx.stroke();
    });
  }
}

function startLadder() {
  document.getElementById('startLadderBtn').disabled=true;
  const nameArr=Array.from({length:ladderN},(_,i)=>{
    const v=document.getElementById('lni'+i)?.value.trim();
    return v||(i+1)+'번';
  });
  let frame=0;
  const anim=setInterval(()=>{
    frame++;
    drawLadder(true,frame/60);
    if(frame>=60){
      clearInterval(anim);
      const entries=nameArr.map((name,i)=>({name,label:ladderResultMap[i],idx:i}));
      entries.sort((a,b)=>parseInt(a.label)-parseInt(b.label));
      document.getElementById('ladderResults').innerHTML=entries.map(({name,label,idx})=>{
        const p=PASTEL[idx%PASTEL.length];
        return `<span class="ladder-result-chip" style="background:${p.bg};border-color:${p.border};color:${p.text}">${name} → ${label}</span>`;
      }).join('');
    }
  },18);
}

function resetLadder() {
  ladderN=0;ladderRungs=[];ladderPaths=[];ladderLabels=[];ladderResultMap={};
  document.getElementById('ladderStep2').style.display='none';
  document.getElementById('ladderStep1').style.display='';
  document.getElementById('ladderResults').innerHTML='';
}
changeDiceCount(0);
</script>
