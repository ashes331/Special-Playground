<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUINED — Escape the Dark</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#3a2e1e;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
}
#wrap { position:relative; width:800px; height:450px; }
canvas { display:block; width:800px; height:450px; }
#hud {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none;
}
#score {
  position:absolute; top:16px; right:20px;
  color:rgba(220,195,140,0.9); font-size:13px; letter-spacing:3px;
}
#meterWrap {
  position:absolute; top:16px; left:20px;
  display:flex; align-items:center; gap:8px;
}
#meterLabel { color:rgba(210,140,50,0.95); font-size:11px; letter-spacing:2px; }
#meterTrack {
  width:100px; height:4px;
  background:rgba(180,150,80,0.2); border-radius:2px; overflow:hidden;
}
#meterFill {
  height:100%; background:#c8821a; border-radius:2px;
  transition:width 0.1s;
}
#overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(30,22,10,0.92);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:all; cursor:pointer;
}
#overlay h1 {
  color:#e8d5a0; font-size:38px; letter-spacing:14px;
  text-transform:uppercase; margin-bottom:6px;
}
.sub { color:rgba(200,140,50,0.9); font-size:11px; letter-spacing:4px; margin-bottom:44px; }
.hint { color:rgba(200,180,120,0.45); font-size:11px; letter-spacing:3px; }
.keys { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; justify-content:center; }
.key {
  border:1px solid rgba(200,160,80,0.2);
  padding:5px 12px; color:rgba(200,170,100,0.5);
  font-size:10px; letter-spacing:1px; border-radius:3px;
  font-family:'Courier New',monospace;
}
#gscore { color:rgba(220,195,140,0.65); font-size:13px; letter-spacing:4px; margin-bottom:14px; display:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="450"></canvas>
  <div id="hud">
    <div id="score">DIST <span id="sv">0</span>m</div>
    <div id="meterWrap">
      <span id="meterLabel">MONSTER</span>
      <div id="meterTrack"><div id="meterFill" style="width:5%"></div></div>
    </div>
  </div>
  <div id="overlay" onclick="startGame()">
    <h1>RUINED</h1>
    <div class="sub">escape the dark</div>
    <div id="gscore"></div>
    <div class="hint">click or press space to run</div>
    <div class="keys">
      <div class="key">← A — LEFT LANE</div>
      <div class="key">→ D — RIGHT LANE</div>
      <div class="key">↑ W SPACE — JUMP</div>
      <div class="key">↓ S — SLIDE</div>
    </div>
  </div>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 800, H = 450;

const VP = { x: W/2, y: 175 };  // 소실점: 화면 중간 약간 위
const GROUND_Y = H - 30;         // 카메라 바로 앞 지면 y
const ZDEPTH = 200;

function project(wx, wz) {
  // wz=0 → 카메라 바로 앞(GROUND_Y), wz=ZDEPTH → 소실점(VP.y)
  const t = wz / ZDEPTH;                        // 0(가까움) ~ 1(멀리)
  const sy = GROUND_Y + t * (VP.y - GROUND_Y);  // 가까우면 아래, 멀면 위
  const scale = 1 - t * 0.85;                   // 가까우면 크게, 멀면 작게
  const sx = VP.x + wx * scale * 170;
  return { x: sx, y: sy, scale };
}

const LANE_X = [-1, 0, 1];

let state = 'idle';
let score = 0, frame = 0, speed = 0.8;
let monsterZ = -80;

const player = {
  lane: 1, targetLane: 1, laneT: 1,
  z: 12,
  vy: 0, jumpZ: 0, jumping: false,
  sliding: false, slideTimer: 0,
  dead: false, runT: 0,
};

let obstacles = [], particles = [], bgSegs = [];
let roadOffset = 0, spawnTimer = 0, spawnInterval = 90;

function makeBgSeg(z) {
  return {
    z,
    lH: 50 + Math.random() * 130,
    rH: 50 + Math.random() * 130,
    lW: 32 + Math.random() * 42,
    rW: 32 + Math.random() * 42,
    win: Math.random() > 0.45,
    phase: Math.random() * 100,
  };
}

function initBg() {
  bgSegs = [];
  for (let z = 15; z < ZDEPTH; z += 16) bgSegs.push(makeBgSeg(z));
}

function spawnObs() {
  const lane = Math.floor(Math.random() * 3);
  const type = Math.random() > 0.4 ? 'barrier' : 'gap';
  obstacles.push({ lane, z: ZDEPTH - 5, type });
}

function initObs() { obstacles = []; spawnTimer = 0; }

function spawnParticles(x, y, n, death) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5) * 7,
      vy: -(Math.random() * 5 + 0.5),
      life: 1, size: 2 + Math.random() * 4, death,
    });
  }
}

const keys = {};
window.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (state !== 'playing') {
    if (['Space','Enter','ArrowUp','KeyW'].includes(e.code)) startGame();
    return;
  }
  if (['ArrowLeft','KeyA'].includes(e.code)) moveLane(-1);
  if (['ArrowRight','KeyD'].includes(e.code)) moveLane(1);
  if (['ArrowUp','KeyW','Space'].includes(e.code)) doJump();
  if (['ArrowDown','KeyS'].includes(e.code)) doSlide();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let ts = {x:0,y:0};
C.addEventListener('touchstart', e => { ts.x=e.touches[0].clientX; ts.y=e.touches[0].clientY; e.preventDefault(); },{passive:false});
C.addEventListener('touchend', e => {
  if (state!=='playing'){startGame();return;}
  const dx=e.changedTouches[0].clientX-ts.x, dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>Math.abs(dy)){ if(dx>20)moveLane(1); else if(dx<-20)moveLane(-1); }
  else { if(dy<-20)doJump(); else if(dy>20)doSlide(); }
  e.preventDefault();
},{passive:false});

function moveLane(d) { const t=player.targetLane+d; if(t>=0&&t<=2)player.targetLane=t; }
function doJump() { if(player.dead||player.jumping)return; player.jumping=true; player.vy=-7; spawnParticles(W/2,H-55,5,false); }
function doSlide() { if(player.dead||player.sliding)return; player.sliding=true; player.slideTimer=30; }

function startGame() {
  document.getElementById('overlay').style.display='none';
  state='playing'; score=0; frame=0; speed=0.8; monsterZ=-80;
  Object.assign(player,{lane:1,targetLane:1,laneT:1,jumping:false,jumpZ:0,vy:0,sliding:false,slideTimer:0,dead:false,runT:0});
  particles=[]; spawnInterval=90;
  initBg(); initObs();
}

function gameOver() {
  state='dead';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.querySelector('h1').textContent='CAUGHT';
  ov.querySelector('.sub').textContent='the darkness got you';
  ov.querySelector('.hint').textContent='click to try again';
  const gs=document.getElementById('gscore');
  gs.style.display='block';
  gs.textContent=`DISTANCE ${Math.floor(score)} M`;
}

function update() {
  frame++;
  score += speed * 0.06;
  speed = 0.8 + Math.sqrt(score) * 0.055;
  spawnInterval = Math.max(42, 90 - Math.sqrt(score) * 2.5);

  player.laneT += (player.targetLane - player.laneT) * 0.18;

  if (player.jumping) {
    player.vy += 0.38;
    player.jumpZ += player.vy * 0.28;
    if (player.jumpZ >= 0) { player.jumpZ=0; player.vy=0; player.jumping=false; }
  }
  if (player.sliding) { player.slideTimer--; if(player.slideTimer<=0)player.sliding=false; }
  player.runT += speed * 0.12;

  spawnTimer++;
  if (spawnTimer >= spawnInterval) { spawnObs(); spawnTimer=0; }

  for (const ob of obstacles) ob.z -= speed;
  obstacles = obstacles.filter(ob => ob.z > 0);

  for (const seg of bgSegs) {
    seg.z -= speed * 0.38;
    if (seg.z < 4) seg.z = ZDEPTH;
  }
  roadOffset = (roadOffset + speed) % 28;

  // 괴물: 속도 높을수록 다가옴, 느리면 조금 물러남
  monsterZ += (speed - 0.72) * 0.045;
  if (monsterZ > 0) monsterZ = 0;
  if (monsterZ < -80) monsterZ = -80;

  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.038;
    if(p.life<=0)particles.splice(i,1);
  }

  if (!player.dead) checkCol();

  document.getElementById('sv').textContent = Math.floor(score);
  const pct = Math.min(100, Math.max(5, (1+monsterZ/80)*100));
  document.getElementById('meterFill').style.width = pct+'%';
}

function checkCol() {
  const pl = player.laneT;
  for (const ob of obstacles) {
    if (ob.z > player.z+5 || ob.z < player.z-4) continue;
    if (Math.abs(pl - ob.lane) > 0.46) continue;
    if (ob.type==='gap') {
      if (!player.jumping || player.jumpZ > -1.5) { killPlayer(); return; }
    } else {
      if (!player.sliding && !player.jumping) { killPlayer(); return; }
    }
  }
  if (monsterZ >= -1) { killPlayer(); return; }
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  const lx = LANE_X[0] + player.laneT * (LANE_X[2]-LANE_X[0]) / 2;
  const pp = project(lx, player.z);
  spawnParticles(pp.x, pp.y-20, 22, true);
  setTimeout(gameOver, 900);
}

// ── 렌더 ──
function drawSky() {
  // 밝은 낮 하늘 — 위는 탁한 파랑, 지평선은 황토 먼지
  const skyGrad = ctx.createLinearGradient(0, 0, 0, VP.y + 5);
  skyGrad.addColorStop(0,   '#7a8fa8');
  skyGrad.addColorStop(0.5, '#a89870');
  skyGrad.addColorStop(1,   '#c8a855');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, VP.y + 5);

  // 태양 (왼쪽 위)
  ctx.fillStyle = 'rgba(255,235,160,0.55)';
  ctx.beginPath(); ctx.arc(W*0.18, 55, 28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,245,200,0.3)';
  ctx.beginPath(); ctx.arc(W*0.18, 55, 44, 0, Math.PI*2); ctx.fill();

  // 먼지 구름
  for(let i=0;i<5;i++){
    const cx2=(i*173+frame*0.08)%W;
    const cy2=30+i*22;
    ctx.fillStyle=`rgba(190,160,90,${0.06+i*0.02})`;
    ctx.beginPath(); ctx.ellipse(cx2, cy2, 60+i*20, 14+i*4, 0, 0, Math.PI*2); ctx.fill();
  }
}

function drawBuildings() {
  const sorted=[...bgSegs].sort((a,b)=>b.z-a.z);
  for(const seg of sorted){
    const lp=project(-2.0, seg.z), rp=project(2.0, seg.z);
    const s=lp.scale;
    const a=Math.min(0.98, s*2.8);

    // 왼쪽 건물 — 콘크리트 회갈색
    const lh=seg.lH*s, lw=seg.lW*s;
    const lc = `rgba(${110+Math.floor(seg.phase%20)},${95+Math.floor(seg.phase%15)},${70+Math.floor(seg.phase%10)},${a})`;
    ctx.fillStyle=lc;
    ctx.fillRect(lp.x-lw, lp.y-lh, lw, lh);
    // 균열/창문
    ctx.fillStyle=`rgba(60,50,35,${0.4*a})`;
    ctx.fillRect(lp.x-lw+lw*0.15, lp.y-lh*0.75, lw*0.22, lh*0.18);
    ctx.fillRect(lp.x-lw+lw*0.55, lp.y-lh*0.45, lw*0.22, lh*0.18);
    // 상단 파손
    if(seg.win){
      ctx.fillStyle=`rgba(80,65,40,${0.6*a})`;
      ctx.fillRect(lp.x-lw, lp.y-lh, lw*0.35, lh*0.12);
    }

    // 오른쪽 건물
    const rh=seg.rH*s, rw=seg.rW*s;
    const rc = `rgba(${100+Math.floor(seg.phase%18)},${88+Math.floor(seg.phase%12)},${65+Math.floor(seg.phase%8)},${a})`;
    ctx.fillStyle=rc;
    ctx.fillRect(rp.x, rp.y-rh, rw, rh);
    ctx.fillStyle=`rgba(60,50,35,${0.4*a})`;
    ctx.fillRect(rp.x+rw*0.2, rp.y-rh*0.6, rw*0.22, rh*0.18);
    ctx.fillRect(rp.x+rw*0.6, rp.y-rh*0.35, rw*0.22, rh*0.18);
    if(seg.win){
      ctx.fillStyle=`rgba(80,65,40,${0.55*a})`;
      ctx.fillRect(rp.x+rw*0.5, rp.y-rh, rw*0.5, rh*0.1);
    }
  }
}

function drawRoad() {
  // 갈라진 아스팔트 — 황토+회색
  ctx.fillStyle='#5a4e38';
  ctx.beginPath();
  const farL=project(-1.5, ZDEPTH), farR=project(1.5, ZDEPTH);
  const nearL=project(-1.5, 0),     nearR=project(1.5, 0);
  ctx.moveTo(nearL.x, H); ctx.lineTo(nearR.x, H);
  ctx.lineTo(farR.x, farR.y); ctx.lineTo(farL.x, farL.y);
  ctx.closePath(); ctx.fill();

  // 노면 질감 — 먼지/모래
  ctx.fillStyle='rgba(180,155,100,0.12)';
  ctx.beginPath();
  ctx.moveTo(nearL.x, H); ctx.lineTo(nearR.x, H);
  ctx.lineTo(farR.x, farR.y); ctx.lineTo(farL.x, farL.y);
  ctx.closePath(); ctx.fill();

  // 레인 경계 — 바랜 흰색 차선
  for(let li=0;li<4;li++){
    const wx=-1.5+li;
    const near=project(wx, 2), far=project(wx, ZDEPTH);
    ctx.strokeStyle=li===0||li===3?'rgba(200,180,120,0.55)':'rgba(200,180,120,0.25)';
    ctx.lineWidth=li===0||li===3?2:0.8;
    ctx.setLineDash(li===0||li===3?[]:[5,12]);
    ctx.beginPath(); ctx.moveTo(far.x, far.y); ctx.lineTo(near.x, near.y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 균열 스크롤
  for(let ci=0;ci<8;ci++){
    const zp=((ci/8*28)+roadOffset)%28+1;
    const p1=project(-1.2+ci*0.3, zp), p2=project(-0.8+ci*0.3, zp);
    ctx.strokeStyle='rgba(40,32,20,0.35)'; ctx.lineWidth=0.6;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }
}

function drawObs() {
  const sorted=[...obstacles].sort((a,b)=>b.z-a.z);
  for(const ob of sorted){
    if(ob.z<0.5)continue;
    const p=project(LANE_X[ob.lane],ob.z), s=p.scale;
    if(ob.type==='barrier'){
      // 콘크리트 바리케이드 — 밝은 회색+주황 경고색
      const bw=28*s, bh=38*s;
      ctx.fillStyle=`rgba(160,140,100,${0.85+s*0.15})`;
      ctx.fillRect(p.x-bw/2, p.y-bh, bw, bh);
      // 경고 줄무늬 (주황/검정)
      ctx.fillStyle=`rgba(220,120,20,${0.9+s*0.1})`;
      ctx.fillRect(p.x-bw/2, p.y-bh,       bw, bh*0.2);
      ctx.fillRect(p.x-bw/2, p.y-bh*0.55,  bw, bh*0.2);
      ctx.fillStyle=`rgba(40,32,20,0.7)`;
      ctx.fillRect(p.x-bw/2, p.y-bh*0.78,  bw, bh*0.2);
      // 테두리
      ctx.strokeStyle=`rgba(100,80,50,0.8)`;
      ctx.lineWidth=s*0.8;
      ctx.strokeRect(p.x-bw/2, p.y-bh, bw, bh);
    } else {
      // 갈라진 바닥 구멍 — 진한 갈색 테두리 + 어두운 속
      const gw=52*s;
      ctx.fillStyle='rgba(25,18,10,0.95)';
      ctx.fillRect(p.x-gw/2, p.y-3*s, gw, 9*s);
      ctx.strokeStyle=`rgba(180,140,70,${0.7+s*0.3})`;
      ctx.lineWidth=s*1.2;
      ctx.strokeRect(p.x-gw/2, p.y-3*s, gw, 9*s);
      // 갈라짐 표시
      ctx.strokeStyle=`rgba(220,170,80,${0.5+s*0.3})`;
      ctx.lineWidth=s*0.6;
      ctx.beginPath();
      ctx.moveTo(p.x-gw*0.3, p.y-3*s);
      ctx.lineTo(p.x, p.y+3*s);
      ctx.lineTo(p.x+gw*0.25, p.y-3*s);
      ctx.stroke();
    }
  }
}

function drawPlayer() {
  const lx = LANE_X[0] + player.laneT * (LANE_X[2]-LANE_X[0]) / 2;
  const p = project(lx, player.z);
  const s = p.scale * 1.45;
  const jOff = player.jumpZ * s * 3.2;
  const bx=p.x, by=p.y+jOff;

  ctx.globalAlpha = player.dead ? 0.25 : 1;

  if(player.sliding){
    ctx.fillStyle='#2a2018'; ctx.fillRect(bx-13*s, by-8*s, 26*s, 10*s);
    ctx.fillStyle='#3d3025'; ctx.fillRect(bx-7*s,  by-16*s, 14*s, 9*s);
  } else {
    const run=Math.sin(player.runT)*3.5*s;
    // 머리 (헬멧 느낌 — 짙은 카키)
    ctx.fillStyle='#3a3020'; ctx.fillRect(bx-5*s, by-28*s, 10*s, 11*s);
    // 몸 (방호복 — 어두운 올리브)
    ctx.fillStyle='#2e2a1a'; ctx.fillRect(bx-7*s, by-18*s, 14*s, 15*s);
    // 다리
    ctx.fillStyle='#222018';
    ctx.fillRect(bx-6*s, by-3*s, 5*s, (10+run)*s);
    ctx.fillRect(bx+1*s, by-3*s, 5*s, (10-run)*s);
    // 팔
    ctx.fillRect(bx-12*s, by-17*s+run*0.5, 5*s, 9*s);
    ctx.fillRect(bx+7*s,  by-17*s-run*0.5, 5*s, 9*s);
    // 배낭 (밝은 포인트)
    ctx.fillStyle='#5a4a28';
    ctx.fillRect(bx+5*s, by-17*s, 5*s, 10*s);
  }

  // 발그림자
  ctx.globalAlpha = player.dead ? 0.08 : 0.22;
  ctx.fillStyle='rgba(30,22,10,1)'; ctx.save(); ctx.scale(1,0.28);
  ctx.beginPath(); ctx.ellipse(bx, p.y/0.28, 10*s, 5*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawMonster() {
  const mz = Math.max(0.3, player.z + monsterZ * 0.1);
  const waveX=Math.sin(frame*0.04)*0.12;
  const mp=project(waveX, mz);
  const s=mp.scale;
  const bob=Math.sin(frame*0.07)*3;
  ctx.globalAlpha=Math.min(0.97, 0.3+s*1.5);
  const mx=mp.x, my=mp.y+bob;

  // 눈 — 밝은 황록 (낮에도 잘 보임)
  ctx.fillStyle=`rgba(180,220,40,${Math.min(1,0.7+s*0.5)})`;
  ctx.beginPath(); ctx.ellipse(mx-7*s, my-28*s, 5*s, 6*s, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx+7*s, my-28*s, 5*s, 6*s,  0.3, 0, Math.PI*2); ctx.fill();

  // 몸통 — 짙은 회갈색 (먼지 뒤덮인 느낌)
  ctx.fillStyle='rgba(55,42,28,0.97)';
  ctx.beginPath(); ctx.ellipse(mx, my-17*s, 22*s, 26*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(38,28,16,0.92)';
  ctx.beginPath(); ctx.ellipse(mx, my+7*s, 14*s, 20*s, 0, 0, Math.PI*2); ctx.fill();

  // 팔
  const armSw=Math.sin(frame*0.08)*14;
  ctx.fillStyle='rgba(45,34,20,0.92)';
  ctx.beginPath(); ctx.ellipse(mx-26*s, my-7*s+armSw*s, 7*s, 16*s,  0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx+26*s, my-7*s-armSw*s, 7*s, 16*s, -0.4, 0, Math.PI*2); ctx.fill();

  // 먼지 안개 — 황토색
  const prox=1+monsterZ/80;
  if(prox>0.2){
    const fog=ctx.createRadialGradient(mx, my, 8*s, mx, my, 100*s);
    fog.addColorStop(0, `rgba(140,100,40,${prox*0.18})`);
    fog.addColorStop(1, 'transparent');
    ctx.fillStyle=fog;
    ctx.beginPath(); ctx.ellipse(mx, my, 100*s, 80*s, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawParticles() {
  for(const p of particles){
    ctx.globalAlpha=p.life*0.85;
    ctx.fillStyle=p.death?'rgba(200,150,50,1)':'rgba(160,130,80,1)';
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha=1;
}

function drawVignette() {
  // 주변 살짝 어둡게 (과도하지 않게)
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(20,14,6,0.5)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // 먼지 오버레이 — 항상 약하게
  ctx.fillStyle='rgba(180,150,80,0.04)';
  ctx.fillRect(0,0,W,H);

  // 괴물 근접 시 황토 먼지 강해짐
  const prox=1+monsterZ/80;
  if(prox>0.4){
    ctx.fillStyle=`rgba(140,100,30,${(prox-0.4)*0.15})`;
    ctx.fillRect(0,0,W,H);
  }
}

function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawBuildings();
  drawRoad();
  if(state==='playing'||state==='dead'){
    if(state==='playing') update();
    else {
      frame++;
      for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.038;
        if(p.life<=0)particles.splice(i,1);
      }
    }
    drawObs();
    drawMonster();
    drawPlayer();
    drawParticles();
    drawVignette();
  }
}
requestAnimationFrame(loop);
</script>
</body>
