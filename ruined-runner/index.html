<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RUINED — Escape the Dark</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1e2820;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Courier New',monospace;
}
#wrap { position:relative; width:800px; height:450px; }
canvas { display:block; width:800px; height:450px; }
#hud {
  position:absolute; top:0; left:0; right:0; bottom:0;
  pointer-events:none;
}
#score {
  position:absolute; top:16px; right:20px;
  color:rgba(200,215,190,0.85); font-size:13px; letter-spacing:3px;
}
#meterWrap {
  position:absolute; top:16px; left:20px;
  display:flex; align-items:center; gap:8px;
}
#meterLabel { color:rgba(180,200,140,0.9); font-size:11px; letter-spacing:2px; }
#meterTrack {
  width:100px; height:4px;
  background:rgba(100,120,80,0.25); border-radius:2px; overflow:hidden;
}
#meterFill {
  height:100%; background:#7aaa38; border-radius:2px;
  transition:width 0.1s;
}
#overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  background:rgba(10,16,10,0.92);
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  pointer-events:all; cursor:pointer;
}
#overlay h1 {
  color:#c8d8b8; font-size:38px; letter-spacing:14px;
  text-transform:uppercase; margin-bottom:6px;
}
.sub { color:rgba(140,180,100,0.85); font-size:11px; letter-spacing:4px; margin-bottom:44px; }
.hint { color:rgba(160,190,140,0.4); font-size:11px; letter-spacing:3px; }
.keys { display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; justify-content:center; }
.key {
  border:1px solid rgba(140,170,110,0.2);
  padding:5px 12px; color:rgba(160,190,140,0.45);
  font-size:10px; letter-spacing:1px; border-radius:3px;
  font-family:'Courier New',monospace;
}
#gscore { color:rgba(190,210,170,0.65); font-size:13px; letter-spacing:4px; margin-bottom:14px; display:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="450"></canvas>
  <div id="hud">
    <div id="score">DIST <span id="sv">0</span>m</div>
    <div id="meterWrap">
      <span id="meterLabel">MONSTER</span>
      <div id="meterTrack"><div id="meterFill" style="width:5%"></div></div>
    </div>
  </div>
  <div id="overlay" onclick="startGame()">
    <h1>RUINED</h1>
    <div class="sub">escape the dark</div>
    <div id="gscore"></div>
    <div class="hint">click or press space to run</div>
    <div class="keys">
      <div class="key">← A — LEFT LANE</div>
      <div class="key">→ D — RIGHT LANE</div>
      <div class="key">↑ W SPACE — JUMP</div>
      <div class="key">↓ S — SLIDE</div>
    </div>
  </div>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const W = 800, H = 450;

const VP = { x: W/2, y: 175 };  // 소실점: 화면 중간 약간 위
const GROUND_Y = H - 30;         // 카메라 바로 앞 지면 y
const ZDEPTH = 200;

function project(wx, wz) {
  // wz=0 → 카메라 바로 앞(GROUND_Y), wz=ZDEPTH → 소실점(VP.y)
  const t = wz / ZDEPTH;                        // 0(가까움) ~ 1(멀리)
  const sy = GROUND_Y + t * (VP.y - GROUND_Y);  // 가까우면 아래, 멀면 위
  const scale = 1 - t * 0.85;                   // 가까우면 크게, 멀면 작게
  const sx = VP.x + wx * scale * 170;
  return { x: sx, y: sy, scale };
}

const LANE_X = [-1, 0, 1];

let state = 'idle';
let score = 0, frame = 0, speed = 0.8;
let monsterZ = -80;

const player = {
  lane: 1, targetLane: 1, laneT: 1,
  z: 12,
  vy: 0, jumpZ: 0, jumping: false,
  sliding: false, slideTimer: 0,
  dead: false, runT: 0,
};

let obstacles = [], particles = [], bgSegs = [];
let roadOffset = 0, spawnTimer = 0, spawnInterval = 90;

function makeBgSeg(z) {
  return {
    z,
    lH: 50 + Math.random() * 130,
    rH: 50 + Math.random() * 130,
    lW: 32 + Math.random() * 42,
    rW: 32 + Math.random() * 42,
    win: Math.random() > 0.45,
    phase: Math.random() * 100,
  };
}

function initBg() {
  bgSegs = [];
  for (let z = 15; z < ZDEPTH; z += 16) bgSegs.push(makeBgSeg(z));
}

function spawnObs() {
  const lane = Math.floor(Math.random() * 3);
  const type = Math.random() > 0.4 ? 'barrier' : 'gap';
  obstacles.push({ lane, z: ZDEPTH - 5, type });
}

function initObs() { obstacles = []; spawnTimer = 0; }

function spawnParticles(x, y, n, death) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x, y,
      vx: (Math.random()-0.5) * 7,
      vy: -(Math.random() * 5 + 0.5),
      life: 1, size: 2 + Math.random() * 4, death,
    });
  }
}

const keys = {};
window.addEventListener('keydown', e => {
  if (keys[e.code]) return;
  keys[e.code] = true;
  if (state !== 'playing') {
    if (['Space','Enter','ArrowUp','KeyW'].includes(e.code)) startGame();
    return;
  }
  if (['ArrowLeft','KeyA'].includes(e.code)) moveLane(-1);
  if (['ArrowRight','KeyD'].includes(e.code)) moveLane(1);
  if (['ArrowUp','KeyW','Space'].includes(e.code)) doJump();
  if (['ArrowDown','KeyS'].includes(e.code)) doSlide();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

let ts = {x:0,y:0};
C.addEventListener('touchstart', e => { ts.x=e.touches[0].clientX; ts.y=e.touches[0].clientY; e.preventDefault(); },{passive:false});
C.addEventListener('touchend', e => {
  if (state!=='playing'){startGame();return;}
  const dx=e.changedTouches[0].clientX-ts.x, dy=e.changedTouches[0].clientY-ts.y;
  if(Math.abs(dx)>Math.abs(dy)){ if(dx>20)moveLane(1); else if(dx<-20)moveLane(-1); }
  else { if(dy<-20)doJump(); else if(dy>20)doSlide(); }
  e.preventDefault();
},{passive:false});

function moveLane(d) { const t=player.targetLane+d; if(t>=0&&t<=2)player.targetLane=t; }
function doJump() { if(player.dead||player.jumping)return; player.jumping=true; player.vy=-7; spawnParticles(W/2,H-55,5,false); }
function doSlide() { if(player.dead||player.sliding)return; player.sliding=true; player.slideTimer=30; }

function startGame() {
  document.getElementById('overlay').style.display='none';
  state='playing'; score=0; frame=0; speed=0.8; monsterZ=-80;
  Object.assign(player,{lane:1,targetLane:1,laneT:1,jumping:false,jumpZ:0,vy:0,sliding:false,slideTimer:0,dead:false,runT:0});
  particles=[]; spawnInterval=90;
  initBg(); initObs();
}

function gameOver() {
  state='dead';
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  ov.querySelector('h1').textContent='CAUGHT';
  ov.querySelector('.sub').textContent='the darkness got you';
  ov.querySelector('.hint').textContent='click to try again';
  const gs=document.getElementById('gscore');
  gs.style.display='block';
  gs.textContent=`DISTANCE ${Math.floor(score)} M`;
}

function update() {
  frame++;
  score += speed * 0.06;
  speed = 0.8 + Math.sqrt(score) * 0.055;
  spawnInterval = Math.max(42, 90 - Math.sqrt(score) * 2.5);

  player.laneT += (player.targetLane - player.laneT) * 0.18;

  if (player.jumping) {
    player.vy += 0.38;
    player.jumpZ += player.vy * 0.28;
    if (player.jumpZ >= 0) { player.jumpZ=0; player.vy=0; player.jumping=false; }
  }
  if (player.sliding) { player.slideTimer--; if(player.slideTimer<=0)player.sliding=false; }
  player.runT += speed * 0.12;

  spawnTimer++;
  if (spawnTimer >= spawnInterval) { spawnObs(); spawnTimer=0; }

  for (const ob of obstacles) ob.z -= speed;
  obstacles = obstacles.filter(ob => ob.z > 0);

  for (const seg of bgSegs) {
    seg.z -= speed * 0.38;
    if (seg.z < 4) seg.z = ZDEPTH;
  }
  roadOffset = (roadOffset + speed) % 28;

  // 괴물: 속도 높을수록 다가옴, 느리면 조금 물러남
  monsterZ += (speed - 0.72) * 0.045;
  if (monsterZ > 0) monsterZ = 0;
  if (monsterZ < -80) monsterZ = -80;

  for (let i=particles.length-1;i>=0;i--) {
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.038;
    if(p.life<=0)particles.splice(i,1);
  }

  if (!player.dead) checkCol();

  document.getElementById('sv').textContent = Math.floor(score);
  const pct = Math.min(100, Math.max(5, (1+monsterZ/80)*100));
  document.getElementById('meterFill').style.width = pct+'%';
}

function checkCol() {
  const pl = player.laneT;
  for (const ob of obstacles) {
    if (ob.z > player.z+5 || ob.z < player.z-4) continue;
    if (Math.abs(pl - ob.lane) > 0.46) continue;
    if (ob.type==='gap') {
      if (!player.jumping || player.jumpZ > -1.5) { killPlayer(); return; }
    } else {
      if (!player.sliding && !player.jumping) { killPlayer(); return; }
    }
  }
  if (monsterZ >= -1) { killPlayer(); return; }
}

function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  const lx = LANE_X[0] + player.laneT * (LANE_X[2]-LANE_X[0]) / 2;
  const pp = project(lx, player.z);
  spawnParticles(pp.x, pp.y-20, 22, true);
  setTimeout(gameOver, 900);
}

// ── 렌더 ──
function drawSky() {
  // 흐린 낮 — 위 연한 청회, 지평선 흰 안개
  const skyGrad = ctx.createLinearGradient(0, 0, 0, VP.y + 5);
  skyGrad.addColorStop(0,   '#8fa8a0');
  skyGrad.addColorStop(0.6, '#b8c8bc');
  skyGrad.addColorStop(1,   '#d8e0d0');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, VP.y + 5);

  // 흐린 태양 (안개 속 확산광)
  ctx.fillStyle = 'rgba(255,255,240,0.18)';
  ctx.beginPath(); ctx.arc(W*0.65, 45, 50, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,245,0.1)';
  ctx.beginPath(); ctx.arc(W*0.65, 45, 80, 0, Math.PI*2); ctx.fill();

  // 안개 레이어 (지평선)
  const fogGrad = ctx.createLinearGradient(0, VP.y-40, 0, VP.y+5);
  fogGrad.addColorStop(0, 'transparent');
  fogGrad.addColorStop(1, 'rgba(210,225,210,0.55)');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, VP.y-40, W, 45);
}

function drawBuildings() {
  const sorted=[...bgSegs].sort((a,b)=>b.z-a.z);
  for(const seg of sorted){
    const lp=project(-2.0, seg.z), rp=project(2.0, seg.z);
    const s=lp.scale;
    const a=Math.min(0.97, s*2.6);

    // 왼쪽 건물 — 콘크리트 회색, 높고 좁게
    const lh=seg.lH*s*1.4, lw=seg.lW*s*0.75;
    ctx.fillStyle=`rgba(${88+Math.floor(seg.phase%18)},${95+Math.floor(seg.phase%14)},${82+Math.floor(seg.phase%10)},${a})`;
    ctx.fillRect(lp.x-lw, lp.y-lh, lw, lh);
    // 창문 격자
    const wRows=Math.max(2,Math.floor(lh/14)), wCols=2;
    for(let wr=0;wr<wRows;wr++) for(let wc=0;wc<wCols;wc++){
      const wx2=lp.x-lw+lw*(0.2+wc*0.45), wy2=lp.y-lh+lh*(0.05+wr/(wRows+1))*0.95;
      const ww=lw*0.2, wh=lh*0.06;
      ctx.fillStyle=`rgba(50,60,50,${0.5*a})`;
      ctx.fillRect(wx2,wy2,ww,wh);
    }
    // 덩굴 (녹색) — 건물 왼쪽 아래
    if(seg.win){
      ctx.fillStyle=`rgba(55,90,45,${0.7*a})`;
      ctx.fillRect(lp.x-lw, lp.y-lh*0.35, lw*0.3, lh*0.35);
      ctx.fillStyle=`rgba(70,110,55,${0.5*a})`;
      ctx.fillRect(lp.x-lw, lp.y-lh*0.6, lw*0.15, lh*0.25);
    }
    // 균열/파손 상단
    ctx.fillStyle=`rgba(40,48,38,${0.45*a})`;
    ctx.fillRect(lp.x-lw+lw*0.6, lp.y-lh, lw*0.4, lh*0.08);

    // 오른쪽 건물
    const rh=seg.rH*s*1.4, rw=seg.rW*s*0.75;
    ctx.fillStyle=`rgba(${82+Math.floor(seg.phase%16)},${90+Math.floor(seg.phase%12)},${78+Math.floor(seg.phase%8)},${a})`;
    ctx.fillRect(rp.x, rp.y-rh, rw, rh);
    const rRows=Math.max(2,Math.floor(rh/14));
    for(let wr=0;wr<rRows;wr++) for(let wc=0;wc<2;wc++){
      const wx2=rp.x+rw*(0.15+wc*0.42), wy2=rp.y-rh+rh*(0.05+wr/(rRows+1))*0.95;
      ctx.fillStyle=`rgba(50,60,50,${0.5*a})`;
      ctx.fillRect(wx2,wy2,rw*0.2,rh*0.06);
    }
    if(seg.win){
      ctx.fillStyle=`rgba(55,90,45,${0.65*a})`;
      ctx.fillRect(rp.x+rw*0.7, rp.y-rh*0.4, rw*0.3, rh*0.4);
      ctx.fillStyle=`rgba(65,100,50,${0.45*a})`;
      ctx.fillRect(rp.x+rw*0.85, rp.y-rh*0.65, rw*0.15, rh*0.28);
    }
    ctx.fillStyle=`rgba(40,48,38,${0.4*a})`;
    ctx.fillRect(rp.x, rp.y-rh, rw*0.35, rh*0.07);
  }
}

function drawRoad() {
  // 젖은 아스팔트 — 짙은 회색
  ctx.fillStyle='#2e3530';
  ctx.beginPath();
  const farL=project(-1.5,ZDEPTH), farR=project(1.5,ZDEPTH);
  const nearL=project(-1.5,0),     nearR=project(1.5,0);
  ctx.moveTo(nearL.x,H); ctx.lineTo(nearR.x,H);
  ctx.lineTo(farR.x,farR.y); ctx.lineTo(farL.x,farL.y);
  ctx.closePath(); ctx.fill();

  // 물 반사 (축축한 노면)
  ctx.fillStyle='rgba(140,160,140,0.1)';
  ctx.beginPath();
  ctx.moveTo(nearL.x,H); ctx.lineTo(nearR.x,H);
  ctx.lineTo(farR.x,farR.y); ctx.lineTo(farL.x,farL.y);
  ctx.closePath(); ctx.fill();

  // 이끼/풀 — 도로 가장자리 녹색
  [project(-1.5,ZDEPTH*0.9), project(-1.5,ZDEPTH*0.5), project(-1.5,ZDEPTH*0.2)].forEach((p2,i)=>{
    ctx.fillStyle=`rgba(55,85,45,${0.35+i*0.1})`;
    ctx.fillRect(p2.x-18*(1-i*0.2), p2.y-3, 14*(1-i*0.2), 5);
  });
  [project(1.5,ZDEPTH*0.9), project(1.5,ZDEPTH*0.5), project(1.5,ZDEPTH*0.2)].forEach((p2,i)=>{
    ctx.fillStyle=`rgba(55,85,45,${0.35+i*0.1})`;
    ctx.fillRect(p2.x+4*(1-i*0.2), p2.y-3, 14*(1-i*0.2), 5);
  });

  // 바랜 차선 (거의 안 보이게)
  for(let li=0;li<4;li++){
    const wx=-1.5+li;
    const near=project(wx,2), far=project(wx,ZDEPTH);
    ctx.strokeStyle=li===0||li===3?'rgba(160,175,155,0.4)':'rgba(140,160,140,0.15)';
    ctx.lineWidth=li===0||li===3?1.5:0.7;
    ctx.setLineDash(li===0||li===3?[]:[4,16]);
    ctx.beginPath(); ctx.moveTo(far.x,far.y); ctx.lineTo(near.x,near.y); ctx.stroke();
  }
  ctx.setLineDash([]);

  // 균열/웅덩이 스크롤
  for(let ci=0;ci<8;ci++){
    const zp=((ci/8*28)+roadOffset)%28+1;
    const p1=project(-1.1+ci*0.28,zp), p2=project(-0.7+ci*0.28,zp);
    ctx.strokeStyle='rgba(20,28,22,0.4)'; ctx.lineWidth=0.7;
    ctx.beginPath(); ctx.moveTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y); ctx.stroke();
  }
}

function drawObs() {
  const sorted=[...obstacles].sort((a,b)=>b.z-a.z);
  for(const ob of sorted){
    if(ob.z<0.5)continue;
    const p=project(LANE_X[ob.lane],ob.z), s=p.scale;
    if(ob.type==='barrier'){
      // 무너진 콘크리트 덩어리 — 회색+이끼
      const bw=30*s, bh=36*s;
      ctx.fillStyle=`rgba(100,110,95,${0.9+s*0.1})`;
      ctx.fillRect(p.x-bw/2, p.y-bh, bw, bh);
      // 이끼 얼룩
      ctx.fillStyle=`rgba(60,90,50,${0.55+s*0.2})`;
      ctx.fillRect(p.x-bw/2,       p.y-bh*0.9,  bw*0.4, bh*0.25);
      ctx.fillRect(p.x+bw*0.1,     p.y-bh*0.45, bw*0.35,bh*0.2);
      // 균열
      ctx.strokeStyle=`rgba(40,50,38,0.7)`;
      ctx.lineWidth=s*0.7;
      ctx.beginPath();
      ctx.moveTo(p.x-bw*0.1, p.y-bh);
      ctx.lineTo(p.x+bw*0.05,p.y-bh*0.5);
      ctx.lineTo(p.x+bw*0.2, p.y);
      ctx.stroke();
      // 테두리
      ctx.strokeStyle=`rgba(60,70,55,0.6)`;
      ctx.lineWidth=s*0.5;
      ctx.strokeRect(p.x-bw/2, p.y-bh, bw, bh);
    } else {
      // 함몰된 바닥 — 어두운 구멍 + 녹색 테두리 풀
      const gw=52*s;
      ctx.fillStyle='rgba(15,20,15,0.97)';
      ctx.fillRect(p.x-gw/2, p.y-3*s, gw, 9*s);
      // 풀/이끼 테두리
      ctx.strokeStyle=`rgba(70,100,55,${0.65+s*0.3})`;
      ctx.lineWidth=s*1.5;
      ctx.strokeRect(p.x-gw/2, p.y-3*s, gw, 9*s);
      // 균열선
      ctx.strokeStyle=`rgba(50,70,40,${0.5+s*0.3})`;
      ctx.lineWidth=s*0.6;
      ctx.beginPath();
      ctx.moveTo(p.x-gw*0.3, p.y-3*s);
      ctx.lineTo(p.x+gw*0.1, p.y+3*s);
      ctx.lineTo(p.x+gw*0.35,p.y-3*s);
      ctx.stroke();
    }
  }
}

function drawPlayer() {
  const lx = LANE_X[0] + player.laneT * (LANE_X[2]-LANE_X[0]) / 2;
  const p = project(lx, player.z);
  const s = p.scale * 1.45;
  const jOff = player.jumpZ * s * 3.2;
  const bx=p.x, by=p.y+jOff;

  ctx.globalAlpha = player.dead ? 0.25 : 1;

  if(player.sliding){
    ctx.fillStyle='#1a2018'; ctx.fillRect(bx-13*s, by-8*s, 26*s, 10*s);
    ctx.fillStyle='#28301e'; ctx.fillRect(bx-7*s, by-16*s, 14*s, 9*s);
  } else {
    const run=Math.sin(player.runT)*3.5*s;
    // 머리 — 밝은 살색 (배경과 대비)
    ctx.fillStyle='#d4a882'; ctx.fillRect(bx-5*s, by-30*s, 10*s, 10*s);
    // 후드/모자 — 짙은 올리브
    ctx.fillStyle='#1e2818'; ctx.fillRect(bx-6*s, by-32*s, 12*s, 7*s);
    // 몸 — 어두운 녹갈색 재킷
    ctx.fillStyle='#28321e'; ctx.fillRect(bx-7*s, by-20*s, 14*s, 15*s);
    // 배낭 — 밝은 카키 (포인트)
    ctx.fillStyle='#7a8858'; ctx.fillRect(bx+4*s, by-19*s, 6*s, 11*s);
    // 다리 — 진한 갈색 바지
    ctx.fillStyle='#1c2018';
    ctx.fillRect(bx-6*s, by-5*s, 5*s, (11+run)*s);
    ctx.fillRect(bx+1*s, by-5*s, 5*s, (11-run)*s);
    // 팔
    ctx.fillStyle='#28321e';
    ctx.fillRect(bx-12*s, by-19*s+run*0.5, 5*s, 9*s);
    ctx.fillRect(bx+7*s,  by-19*s-run*0.5, 5*s, 9*s);
  }

  ctx.globalAlpha = player.dead ? 0.08 : 0.2;
  ctx.fillStyle='rgba(15,20,14,1)'; ctx.save(); ctx.scale(1,0.28);
  ctx.beginPath(); ctx.ellipse(bx, p.y/0.28, 10*s, 5*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  ctx.globalAlpha=1;
}

function drawMonster() {
  const mz = Math.max(0.3, player.z + monsterZ * 0.1);
  const waveX=Math.sin(frame*0.04)*0.12;
  const mp=project(waveX, mz);
  const s=mp.scale;
  const bob=Math.sin(frame*0.07)*3;
  ctx.globalAlpha=Math.min(0.97, 0.3+s*1.5);
  const mx=mp.x, my=mp.y+bob;

  // 눈 — 호박색 (안개 속에서도 식별)
  ctx.fillStyle=`rgba(220,160,30,${Math.min(1,0.75+s*0.4)})`;
  ctx.beginPath(); ctx.ellipse(mx-7*s, my-28*s, 5*s, 6*s, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx+7*s, my-28*s, 5*s, 6*s,  0.3, 0, Math.PI*2); ctx.fill();
  // 눈 하이라이트
  ctx.fillStyle='rgba(255,220,100,0.6)';
  ctx.beginPath(); ctx.ellipse(mx-7*s, my-29*s, 2*s, 2*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx+7*s, my-29*s, 2*s, 2*s, 0, 0, Math.PI*2); ctx.fill();

  // 몸통 — 매우 짙은 회녹색 (배경과 구분)
  ctx.fillStyle='rgba(28,35,25,0.97)';
  ctx.beginPath(); ctx.ellipse(mx, my-17*s, 22*s, 26*s, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(18,24,16,0.93)';
  ctx.beginPath(); ctx.ellipse(mx, my+7*s, 14*s, 20*s, 0, 0, Math.PI*2); ctx.fill();

  // 팔
  const armSw=Math.sin(frame*0.08)*14;
  ctx.fillStyle='rgba(22,30,18,0.93)';
  ctx.beginPath(); ctx.ellipse(mx-26*s, my-7*s+armSw*s, 7*s, 16*s,  0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(mx+26*s, my-7*s-armSw*s, 7*s, 16*s, -0.4, 0, Math.PI*2); ctx.fill();

  // 포자/안개 — 연두빛 (TLOU 클리커 느낌)
  const prox=1+monsterZ/80;
  if(prox>0.2){
    const fog=ctx.createRadialGradient(mx, my, 8*s, mx, my, 110*s);
    fog.addColorStop(0, `rgba(80,120,50,${prox*0.2})`);
    fog.addColorStop(1, 'transparent');
    ctx.fillStyle=fog;
    ctx.beginPath(); ctx.ellipse(mx, my, 110*s, 85*s, 0, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

function drawParticles() {
  for(const p of particles){
    ctx.globalAlpha=p.life*0.85;
    ctx.fillStyle=p.death?'rgba(180,140,80,1)':'rgba(120,140,100,1)';
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha=1;
}

function drawVignette() {
  // 주변 안개 — 연녹회색
  const vig=ctx.createRadialGradient(W/2,H/2,H*0.2,W/2,H/2,H*0.9);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(30,40,28,0.45)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  // 전체 안개 레이어 — 항상 옅게
  ctx.fillStyle='rgba(180,200,175,0.06)';
  ctx.fillRect(0,0,W,H);

  // 괴물 근접 — 포자 안개 짙어짐
  const prox=1+monsterZ/80;
  if(prox>0.35){
    ctx.fillStyle=`rgba(60,90,40,${(prox-0.35)*0.14})`;
    ctx.fillRect(0,0,W,H);
  }
}

function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0,0,W,H);
  drawSky();
  drawBuildings();
  drawRoad();
  if(state==='playing'||state==='dead'){
    if(state==='playing') update();
    else {
      frame++;
      for(let i=particles.length-1;i>=0;i--){
        const p=particles[i];
        p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life-=0.038;
        if(p.life<=0)particles.splice(i,1);
      }
    }
    drawObs();
    drawMonster();
    drawPlayer();
    drawParticles();
    drawVignette();
  }
}
requestAnimationFrame(loop);
</script>
</body>
