<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pathfinding Visualizer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">PATH<span>/</span>FIND</div>

  <div class="controls">
    <!-- Algorithm -->
    <div class="tool-group">
      <span class="tool-label" data-i18n="label_algo">알고리즘</span>
      <select id="algoSelect">
        <option value="astar" data-i18n-opt="algo_astar">A* (맨해튼)</option>
        <option value="astar_euclidean" data-i18n-opt="algo_astar_e">A* (유클리드)</option>
        <option value="dijkstra">Dijkstra</option>
        <option value="bfs">BFS</option>
        <option value="dfs">DFS</option>
        <option value="greedy" data-i18n-opt="algo_greedy">Greedy Best-First</option>
      </select>
    </div>

    <div class="sep"></div>

    <!-- Tools -->
    <div class="tool-group">
      <span class="tool-label" data-i18n="label_tool">도구</span>
      <button class="tool-btn active" id="toolWall" data-i18n-title="tool_wall_tip" title="벽 그리기">🧱</button>
      <button class="tool-btn" id="toolWeight" data-i18n-title="tool_weight_tip" title="가중치 (+5)">⚖️</button>
      <button class="tool-btn" id="toolErase" data-i18n-title="tool_erase_tip" title="지우기">🧹</button>
    </div>

    <div class="sep"></div>

    <!-- Maze -->
    <div class="dropdown-wrap">
      <button class="btn" id="mazeBtn" data-i18n="btn_maze">미로 ▾</button>
      <div class="dropdown-menu" id="mazeMenu">
        <div class="dropdown-item" data-maze="recursive" data-i18n="maze_recursive">재귀 분할</div>
        <div class="dropdown-item" data-maze="random" data-i18n="maze_random">랜덤 벽</div>
        <div class="dropdown-item" data-maze="spiral" data-i18n="maze_spiral">나선형</div>
      </div>
    </div>

    <!-- Speed -->
    <div class="speed-wrap">
      <span class="tool-label" data-i18n="label_speed">속도</span>
      <input type="range" id="speedSlider" min="1" max="5" value="3">
    </div>

    <!-- Actions -->
    <button class="btn primary" id="runBtn" data-i18n="btn_run">▶ 실행</button>
    <button class="btn" id="clearPathBtn" data-i18n="btn_clear_path">경로 지우기</button>
    <button class="btn danger" id="clearAllBtn" data-i18n="btn_reset">초기화</button>

    <div class="sep"></div>

    <!-- Language toggle -->
    <button class="btn lang-btn" id="langBtn" title="언어 변경 / Switch Language">한·EN</button>
  </div>

  <div class="stats">
    <div class="stat">
      <span class="stat-val" id="statVisited">0</span>
      <span class="stat-lbl" data-i18n="stat_visited">방문</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statPath">0</span>
      <span class="stat-lbl" data-i18n="stat_path">경로 길이</span>
    </div>
    <div class="stat">
      <span class="stat-val" id="statCost">0</span>
      <span class="stat-lbl" data-i18n="stat_cost">비용</span>
    </div>
  </div>
</header>

<div class="statusbar">
  <span class="status-msg" id="statusMsg"></span>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#22c55e"></div><span data-i18n="leg_start">시작</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div><span data-i18n="leg_end">도착</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#2a2a3a"></div><span data-i18n="leg_wall">벽</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed66"></div><span data-i18n="leg_weight">가중치</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#00e5ff44"></div><span data-i18n="leg_visited">방문</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#f59e0b"></div><span data-i18n="leg_path">경로</span></div>
  </div>
</div>

<div class="canvas-wrap" id="canvasWrap">
  <canvas id="grid"></canvas>
</div>

<script src="js/main.js"></script>
</body>
</html>
