<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network Playground</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <div class="logo">NN<span>/</span>PLAYGROUND</div>
  <div class="header-stats">
    <div class="hstat">epoch <b id="hEpoch">0</b></div>
    <div class="hstat">loss <b id="hLoss">—</b></div>
    <div class="hstat">acc <b id="hAcc">—</b></div>
    <div class="hstat"><span class="status-dot" id="statusDot"></span> <span id="statusTxt">대기</span></div>
  </div>
</header>

<div class="body">

  <!-- ── Left panel ── -->
  <div class="left-panel">

    <div class="panel-section">
      <div class="section-label">Dataset</div>
      <select id="datasetSelect">
        <option value="xor">XOR</option>
        <option value="circle">Circle</option>
        <option value="spiral">Spiral</option>
        <option value="gaussian">Gaussian</option>
      </select>
      <canvas id="dataCanvas"></canvas>
      <div class="control-row">
        <span class="ctrl-label">노이즈</span>
        <input type="range" id="noiseSlider" min="0" max="50" value="10" step="1">
        <span class="ctrl-val" id="noiseVal">10</span>
      </div>
      <div class="control-row">
        <span class="ctrl-label">샘플 수</span>
        <input type="range" id="sampleSlider" min="50" max="400" value="200" step="50">
        <span class="ctrl-val" id="sampleVal">200</span>
      </div>
      <button class="btn" id="regenBtn">데이터 재생성</button>
    </div>

    <div class="panel-section">
      <div class="section-label">Network</div>
      <div class="layer-builder" id="layerBuilder"></div>
      <div style="display:flex;gap:6px;margin-top:2px">
        <button class="layer-add-btn btn" id="addLayerBtn" style="flex:1">+ 레이어 추가</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Hyperparameters</div>
      <div class="control-row">
        <span class="ctrl-label">Learning rate</span>
        <select id="lrSelect" style="width:90px">
          <option value="0.001">0.001</option>
          <option value="0.003">0.003</option>
          <option value="0.01" selected>0.01</option>
          <option value="0.03">0.03</option>
          <option value="0.1">0.1</option>
          <option value="0.3">0.3</option>
          <option value="1">1</option>
        </select>
      </div>
      <div class="control-row">
        <span class="ctrl-label">Activation</span>
        <select id="actSelect" style="width:90px">
          <option value="relu">ReLU</option>
          <option value="tanh" selected>Tanh</option>
          <option value="sigmoid">Sigmoid</option>
        </select>
      </div>
      <div class="control-row">
        <span class="ctrl-label">Batch size</span>
        <select id="batchSelect" style="width:90px">
          <option value="10">10</option>
          <option value="32" selected>32</option>
          <option value="64">64</option>
          <option value="128">128</option>
        </select>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-label">Control</div>
      <div class="btn-group">
        <button class="btn primary" id="runBtn">▶ 학습 시작</button>
        <button class="btn" id="stepBtn">Step</button>
      </div>
      <button class="btn" id="resetBtn" style="margin-top:4px">초기화</button>
    </div>

  </div>

  <!-- ── Center ── -->
  <div class="center">
    <div class="canvas-header">
      <span class="canvas-title">DECISION BOUNDARY</span>
      <span class="epoch-badge" id="epochBadge">epoch 0</span>
    </div>
    <div class="canvas-wrap" id="canvasWrap">
      <canvas id="boundaryCanvas"></canvas>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#2563eb;border-color:#2563eb"></div>class 0</div>
        <div class="legend-item"><div class="legend-dot" style="background:#dc2626;border-color:#dc2626"></div>class 1</div>
      </div>
    </div>
  </div>

  <!-- ── Right panel ── -->
  <div class="right-panel">

    <div class="rp-section">
      <div class="rp-label">Metrics</div>
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-val" id="mEpoch">0</div>
          <div class="metric-lbl">Epoch</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="mAcc">—</div>
          <div class="metric-lbl">Accuracy</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="mLoss">—</div>
          <div class="metric-lbl">Loss</div>
        </div>
        <div class="metric-card">
          <div class="metric-val" id="mLr">0.01</div>
          <div class="metric-lbl">LR</div>
        </div>
      </div>
    </div>

    <div class="rp-section" style="flex:1">
      <div class="rp-label">Loss Curve</div>
      <canvas id="lossCanvas"></canvas>
    </div>

    <div class="rp-section" style="flex:1">
      <div class="rp-label">Network Diagram</div>
      <canvas id="netCanvas"></canvas>
    </div>

  </div>
</div>

<script src="js/main.js"></script>
</body>
</html>
