<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Special Playground</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #f0ede8;
      --surface:  #f8f6f2;
      --card:     #ffffff;
      --border:   #e2ddd7;
      --text:     #1e1a16;
      --sub:      #9a9088;
      --accent:   #3d3530;
      --tag:      #7c6f64;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
      padding: 72px 32px 80px;
    }

    /* ── 히어로 ── */
    .hero {
      margin-bottom: 56px;
    }

    .hero-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--tag);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .hero-title {
      font-size: clamp(36px, 6vw, 60px);
      font-weight: 700;
      color: var(--text);
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 18px;
    }

    .hero-title span {
      color: var(--tag);
      font-weight: 300;
    }

    .hero-desc {
      font-size: 16px;
      font-weight: 300;
      color: var(--sub);
      line-height: 1.7;
      max-width: 420px;
    }

    /* ── 구분 ── */
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--sub);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    /* ── 대시보드 ── */
    .dashboard {
      display: grid;
      grid-template-columns: 220px 1fr;
      gap: 12px;
      min-height: 320px;
    }

    /* 사이드바 */
    .sidebar {
      background: var(--accent);
      border-radius: 16px;
      padding: 24px 18px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .sidebar-title {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 2px;
      margin-bottom: 10px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .15s;
      text-decoration: none;
    }

    .nav-item:hover { background: rgba(255,255,255,0.08); }
    .nav-item.active { background: rgba(255,255,255,0.12); }

    .nav-icon {
      font-size: 16px;
      width: 20px;
      text-align: center;
    }

    .nav-text {
      font-size: 13px;
      font-weight: 400;
      color: rgba(255,255,255,0.75);
    }

    .nav-item.active .nav-text { color: #fff; font-weight: 500; }

    .nav-num {
      margin-left: auto;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.25);
    }

    .sidebar-spacer { flex: 1; }

    .sidebar-footer {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.2);
      letter-spacing: 1px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.06);
    }

    /* 메인 패널 */
    .main-panel {
      background: var(--surface);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 28px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--sub);
      letter-spacing: 1px;
    }

    .panel-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--border);
    }

    /* 프로젝트 카드 */
    .proj-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 18px;
      transition: box-shadow .2s, transform .2s, border-color .2s;
    }

    .proj-card:hover {
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      border-color: #ccc8c2;
      transform: translateY(-2px);
    }

    .proj-thumb {
      width: 48px; height: 48px;
      background: var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      flex-shrink: 0;
    }

    .proj-info { flex: 1; }

    .proj-num {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--sub);
      letter-spacing: 2px;
      margin-bottom: 4px;
    }

    .proj-name {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }

    .proj-desc {
      font-size: 13px;
      font-weight: 300;
      color: var(--sub);
    }

    .proj-arrow {
      font-size: 18px;
      color: var(--border);
      transition: color .2s, transform .2s;
    }

    .proj-card:hover .proj-arrow {
      color: var(--tag);
      transform: translateX(3px);
    }

    /* 빈 카드 */
    .proj-empty {
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      padding: 20px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .proj-empty-thumb {
      width: 48px; height: 48px;
      background: var(--bg);
      border-radius: 12px;
      border: 1px dashed var(--border);
      flex-shrink: 0;
    }

    .proj-empty-text {
      font-size: 13px;
      color: var(--border);
    }

    /* ── 페이드인 ── */
    .hero, .section-label, .dashboard {
      opacity: 0; transform: translateY(14px);
      animation: up .5s ease forwards;
    }
    .hero         { animation-delay: .05s; }
    .section-label{ animation-delay: .15s; }
    .dashboard    { animation-delay: .22s; }

    @keyframes up { to { opacity:1; transform:translateY(0); } }
  </style>
</head>
<body>
<div class="wrap">

  <!-- 히어로 -->
  <div class="hero">
    <div class="hero-label">ashes331 · special-playground</div>
    <h1 class="hero-title">Special<br><span>Playground</span></h1>
    <p class="hero-desc">만들고 싶은 것들을 직접 만들어보는 공간입니다.<br>게임, 도구, 미니 프로젝트 등을 담아두고 있어요.</p>
  </div>

  <!-- 대시보드 -->
  <div class="section-label">Projects</div>
  <div class="dashboard">

    <!-- 사이드바 -->
    <div class="sidebar">
      <div class="sidebar-title">CATEGORY</div>
      <a class="nav-item active" href="#">
        <span class="nav-icon">🎮</span>
        <span class="nav-text">Games</span>
        <span class="nav-num">1</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">🔧</span>
        <span class="nav-text">Tools</span>
        <span class="nav-num">0</span>
      </a>
      <a class="nav-item" href="#">
        <span class="nav-icon">✦</span>
        <span class="nav-text">Etc</span>
        <span class="nav-num">0</span>
      </a>
      <div class="sidebar-spacer"></div>
      <div class="sidebar-footer">2025</div>
    </div>

    <!-- 메인 패널 -->
    <div class="main-panel">
      <div class="panel-header">
        <div class="panel-title">ALL PROJECTS</div>
        <div class="panel-count">1 / ∞</div>
      </div>

      <a class="proj-card" href="./tetris/">
        <div class="proj-thumb">🎮</div>
        <div class="proj-info">
          <div class="proj-num">01 · GAME</div>
          <div class="proj-name">Tetris</div>
          <div class="proj-desc">바닐라 JS 테트리스</div>
        </div>
        <div class="proj-arrow">→</div>
      </a>

      <div class="proj-empty">
        <div class="proj-empty-thumb"></div>
        <div class="proj-empty-text">다음 프로젝트 준비 중...</div>
      </div>

    </div>
  </div>

</div>
</body>
</html>
