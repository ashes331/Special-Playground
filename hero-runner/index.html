<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Runner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #1a0a2e;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  height: 100vh; overflow: hidden;
  font-family: 'Courier New', monospace;
  image-rendering: pixelated;
}
#wrap { position: relative; width: 800px; height: 400px; }
canvas {
  display: block; width: 800px; height: 400px;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#overlay {
  position: absolute; top:0; left:0; right:0; bottom:0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: all; cursor: pointer;
}
#overlaybg {
  position: absolute; top:0; left:0; right:0; bottom:0;
  background: rgba(10,5,20,0.88);
}
.ov { position: relative; z-index:2; text-align: center; }
.ov h1 {
  font-size: 48px; letter-spacing: 8px;
  color: #ffe566; text-transform: uppercase;
  text-shadow: 4px 4px 0 #c8a000, 8px 8px 0 rgba(0,0,0,0.4);
  margin-bottom: 4px;
  animation: blink 1.5s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.85} }
.ov .sub {
  font-size: 12px; letter-spacing: 4px;
  color: #7be08a; margin-bottom: 32px; text-transform: uppercase;
}
.ov .best {
  font-size: 11px; letter-spacing: 3px;
  color: #aaa; margin-bottom: 24px;
}
.ov .best span { color: #ffe566; }
.ov .start {
  font-size: 13px; letter-spacing: 3px; color: #fff;
  border: 2px solid #ffe566; padding: 8px 24px;
  animation: pulse 1s ease-in-out infinite;
  display: inline-block; text-transform: uppercase;
}
@keyframes pulse {
  0%,100%{ border-color:#ffe566; color:#ffe566; }
  50%{ border-color:#fff; color:#fff; }
}
.ov .keys {
  display: flex; gap: 10px; margin-top: 20px;
  justify-content: center; flex-wrap: wrap;
}
.ov .key {
  border: 1px solid rgba(255,229,102,0.3);
  padding: 4px 10px; color: rgba(255,229,102,0.55);
  font-size: 9px; letter-spacing: 1px;
  font-family: 'Courier New', monospace;
}
.ov .died { color: #ff6b6b; font-size: 13px; letter-spacing: 3px; margin-bottom: 8px; display:none; }
.ov .scoreshow { color: #ffe566; font-size: 12px; letter-spacing: 3px; margin-bottom: 20px; display:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="800" height="400"></canvas>
  <div id="overlay" onclick="startGame()">
    <div id="overlaybg"></div>
    <div class="ov">
      <h1 id="ovTitle">Hero Run</h1>
      <div class="sub" id="ovSub">pixel adventure</div>
      <div class="died" id="ovDied">game over</div>
      <div class="scoreshow" id="ovScore"></div>
      <div class="best" id="ovBest">best: <span id="bestVal">0</span> m</div>
      <div class="start" id="ovStart">press space to start</div>
      <div class="keys">
        <div class="key">↑ / W / Space — jump</div>
        <div class="key">↓ / S — slide</div>
        <div class="key">double jump ok</div>
      </div>
    </div>
  </div>
</div>
<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = 800, H = 400;
const GY = 290; // 지면 y
const TILE = 8;

// ── 팔레트 ──
const PAL = {
  sky1:'#5c94fc', sky2:'#9bb8ff',
  cloud:'#ffffff',
  ground1:'#52a800', ground2:'#3c7800', ground3:'#6fce00',
  dirt:'#8b4513', dirt2:'#6b3410',
  coin:'#ffe566', coinShine:'#fff8aa', coinDark:'#c8a000',
  heroBody:'#e8a030', heroShirt:'#4169e1', heroSkin:'#ffcc88',
  heroHair:'#3a1a00', heroPants:'#222288', heroBoots:'#4a2a00',
  heroSword:'#ccddff', heroShield:'#cc4444',
  cactus:'#228b22', cactus2:'#1a6e1a',
  rock:'#888', rock2:'#aaa', rock3:'#666',
  bird1:'#2255cc', bird2:'#1144aa',
  coin_ui:'#ffe566',
};

// ── 상태 ──
let state = 'idle';
let score = 0, coins = 0, frame = 0, speed = 3.2;
let best = parseInt(localStorage.getItem('herorun_best') || '0');
let groundX = 0, cloudX = 0, bgX = 0;
let particles = [];
let spawnTimer = 0, spawnInterval = 80;
let coinSpawnTimer = 0, coinSpawnInterval = 55;

// ── 플레이어 ──
const P = {
  x: 100, y: GY,
  vy: 0, jumping: false, jumpCount: 0,
  sliding: false, slideTimer: 0,
  dead: false, runT: 0,
  invincible: 0,
};

// ── 오브젝트 ──
let obstacles = [], coinObjs = [], birds = [];

// ── 구름 ──
const clouds = [
  {x:120,y:40,w:3},{x:300,y:60,w:2},{x:520,y:30,w:4},{x:680,y:55,w:2}
];

function resetGame() {
  score = 0; coins = 0; frame = 0; speed = 3.2;
  groundX = 0; cloudX = 0;
  particles = []; obstacles = []; coinObjs = []; birds = [];
  spawnTimer = 0; spawnInterval = 80;
  coinSpawnTimer = 0; coinSpawnInterval = 55;
  Object.assign(P, {
    x:100, y:GY, vy:0, jumping:false, jumpCount:0,
    sliding:false, slideTimer:0, dead:false, runT:0, invincible:0
  });
}

function startGame() {
  if (state === 'playing') return;
  resetGame();
  document.getElementById('overlay').style.display = 'none';
  state = 'playing';
}

function gameOver() {
  state = 'dead';
  if (Math.floor(score) > best) {
    best = Math.floor(score);
    localStorage.setItem('herorun_best', best);
  }
  const ov = document.getElementById('overlay');
  ov.style.display = 'flex';
  document.getElementById('ovTitle').textContent = 'GAME OVER';
  document.getElementById('ovSub').textContent = 'you were defeated';
  document.getElementById('ovDied').style.display = 'block';
  const sc = document.getElementById('ovScore');
  sc.style.display = 'block';
  sc.textContent = `score: ${Math.floor(score)} m  ·  coins: ${coins}`;
  document.getElementById('bestVal').textContent = best;
  document.getElementById('ovStart').textContent = 'press space to retry';
}

// ── 입력 ──
window.addEventListener('keydown', e => {
  if (state !== 'playing') {
    if (['Space','ArrowUp','KeyW','Enter'].includes(e.code)) startGame();
    return;
  }
  if (['ArrowUp','KeyW','Space'].includes(e.code)) doJump();
  if (['ArrowDown','KeyS'].includes(e.code)) doSlide();
});

let ts = {x:0, y:0};
document.getElementById('c').addEventListener('touchstart', e => {
  ts.x = e.touches[0].clientX; ts.y = e.touches[0].clientY;
  if (state !== 'playing') { startGame(); return; }
  e.preventDefault();
}, {passive:false});
document.getElementById('c').addEventListener('touchend', e => {
  if (state !== 'playing') return;
  const dy = ts.y - e.changedTouches[0].clientY;
  if (dy > 15) doJump(); else doSlide();
  e.preventDefault();
}, {passive:false});

function doJump() {
  if (P.dead) return;
  if (P.jumpCount < 2) {
    P.vy = P.jumpCount === 0 ? -11 : -9;
    P.jumping = true;
    P.jumpCount++;
    P.sliding = false;
    spawnParticles(P.x + 8, P.y + 2, 5, 'jump');
  }
}
function doSlide() {
  if (P.dead || P.jumping) return;
  P.sliding = true; P.slideTimer = 35;
}

// ── 파티클 ──
function spawnParticles(x, y, n, type) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const spd = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(a) * spd * (type==='coin'?1.5:1),
      vy: Math.sin(a) * spd - (type==='jump'?2:0),
      life: 1,
      color: type==='coin' ? PAL.coinShine : type==='die' ? '#ff6b6b' : '#ffffffcc',
      size: type==='coin' ? TILE : TILE*0.75,
    });
  }
}

// ── 스폰 ──
function spawnObstacle() {
  const r = Math.random();
  if (r < 0.45) {
    // 선인장
    const h = (2 + Math.floor(Math.random() * 3)) * TILE;
    obstacles.push({type:'cactus', x:W+20, y:GY, w:TILE*2, h});
  } else if (r < 0.75) {
    // 돌
    obstacles.push({type:'rock', x:W+20, y:GY, w:TILE*3, h:TILE*2});
  } else {
    // 새 (공중 장애물)
    const by = GY - TILE*5 - Math.random()*TILE*4;
    birds.push({x:W+20, y:by, wing:0, wingT:0});
  }
}

function spawnCoin() {
  const x = W + 20;
  // 코인 라인 또는 단일
  const cnt = Math.random() > 0.5 ? 1 : 3 + Math.floor(Math.random()*3);
  const isAir = Math.random() > 0.4;
  const cy = isAir ? GY - TILE*4 - Math.random()*TILE*3 : GY - TILE;
  for (let i = 0; i < cnt; i++) {
    coinObjs.push({x: x + i*TILE*2.5, y: cy, collected:false, bobT: Math.random()*Math.PI*2});
  }
}

// ── 업데이트 ──
function update() {
  frame++;
  score += speed * 0.04;
  speed = 3.2 + Math.sqrt(score) * 0.1;
  spawnInterval = Math.max(38, 80 - Math.sqrt(score) * 2);
  coinSpawnInterval = Math.max(30, 55 - Math.sqrt(score));

  // 스폰
  spawnTimer++;
  if (spawnTimer >= spawnInterval) { spawnObstacle(); spawnTimer = 0; }
  coinSpawnTimer++;
  if (coinSpawnTimer >= coinSpawnInterval) { spawnCoin(); coinSpawnTimer = 0; }

  // 플레이어 물리
  if (P.jumping) {
    P.vy += 0.55;
    P.y += P.vy;
    if (P.y >= GY) {
      P.y = GY; P.vy = 0;
      P.jumping = false; P.jumpCount = 0;
    }
  }
  if (P.sliding) {
    P.slideTimer--;
    if (P.slideTimer <= 0) P.sliding = false;
  }
  if (P.invincible > 0) P.invincible--;
  P.runT += speed * 0.1;

  // 장애물 이동
  for (const ob of obstacles) ob.x -= speed;
  obstacles = obstacles.filter(ob => ob.x > -40);

  // 새 이동
  for (const b of birds) {
    b.x -= speed * 1.1;
    b.wingT += 0.15;
    b.wing = Math.sin(b.wingT) * 6;
  }
  birds = birds.filter(b => b.x > -30);

  // 코인 이동
  for (const co of coinObjs) {
    co.x -= speed;
    co.bobT += 0.08;
  }
  coinObjs = coinObjs.filter(co => co.x > -20 && !co.collected);

  // 배경 스크롤
  groundX = (groundX + speed) % (TILE * 4);
  cloudX = (cloudX + speed * 0.3) % W;
  for (const cl of clouds) {
    cl.x -= speed * 0.3;
    if (cl.x + cl.w * TILE * 3 < 0) cl.x = W + 20;
  }

  // 파티클
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.15;
    p.life -= 0.05;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (!P.dead) checkCollision();
}

function checkCollision() {
  const PH = P.sliding ? TILE*2 : TILE*4;
  const PW = TILE*2;
  const px1 = P.x, px2 = P.x + PW;
  const py1 = P.y - PH, py2 = P.y;

  // 장애물
  for (const ob of obstacles) {
    const ox1 = ob.x + 4, ox2 = ob.x + ob.w - 4;
    const oy1 = ob.y - ob.h, oy2 = ob.y;
    if (px2 > ox1 && px1 < ox2 && py2 > oy1 && py1 < oy2) {
      if (P.invincible === 0) killPlayer();
      return;
    }
  }
  // 새
  for (const b of birds) {
    const bx1 = b.x, bx2 = b.x + TILE*3;
    const by1 = b.y - TILE, by2 = b.y + TILE;
    if (px2 > bx1 && px1 < bx2 && py2 > by1 && py1 < by2) {
      if (P.invincible === 0) killPlayer();
      return;
    }
  }
  // 코인
  for (const co of coinObjs) {
    if (co.collected) continue;
    const cx1 = co.x, cx2 = co.x + TILE;
    const cy = co.y + Math.sin(co.bobT) * 4;
    const cy1 = cy - TILE, cy2 = cy + TILE;
    if (px2 > cx1 && px1 < cx2 && py2 > cy1 && py1 < cy2) {
      co.collected = true;
      coins++;
      spawnParticles(co.x, cy, 6, 'coin');
    }
  }
}

function killPlayer() {
  P.dead = true;
  spawnParticles(P.x+8, P.y-TILE*2, 14, 'die');
  setTimeout(gameOver, 900);
}

// ── 픽셀 그리기 헬퍼 ──
function px(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), w, h);
}

// ── 렌더 ──
function drawSky() {
  // 하늘 그라데이션 (2색)
  const g = ctx.createLinearGradient(0,0,0,GY);
  g.addColorStop(0, PAL.sky1);
  g.addColorStop(1, PAL.sky2);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, GY);
}

function drawClouds() {
  for (const cl of clouds) {
    const cw = cl.w * TILE*3, ch = TILE*2;
    ctx.fillStyle = PAL.cloud;
    // 구름 픽셀 모양
    px(cl.x,      cl.y+TILE,   cw,      ch,     PAL.cloud);
    px(cl.x+TILE, cl.y,        cw-TILE*2, TILE,  PAL.cloud);
    px(cl.x+TILE*2,cl.y-TILE,  cw-TILE*4, TILE,  PAL.cloud);
  }
}

function drawGround() {
  // 풀 레이어
  for (let x = -groundX % (TILE*4); x < W; x += TILE*4) {
    px(x, GY, TILE*4, TILE, PAL.ground1);
    px(x, GY+TILE, TILE*4, TILE, PAL.ground2);
    // 풀잎
    px(x, GY-TILE, TILE, TILE, PAL.ground3);
    px(x+TILE*2, GY-TILE, TILE, TILE, PAL.ground3);
  }
  // 흙
  px(0, GY+TILE*2, W, H-(GY+TILE*2), PAL.dirt);
  // 흙 무늬
  for (let x = -groundX%(TILE*8); x < W; x += TILE*8) {
    px(x+TILE, GY+TILE*3, TILE*2, TILE, PAL.dirt2);
    px(x+TILE*5, GY+TILE*4, TILE*2, TILE, PAL.dirt2);
  }
}

function drawObstacles() {
  for (const ob of obstacles) {
    if (ob.type === 'cactus') {
      // 선인장 몸통
      px(ob.x, ob.y-ob.h, TILE*2, ob.h, PAL.cactus);
      // 가지
      px(ob.x-TILE, ob.y-ob.h*0.65, TILE, TILE*2, PAL.cactus);
      px(ob.x-TILE, ob.y-ob.h*0.65-TILE*2, TILE*2, TILE, PAL.cactus);
      px(ob.x+TILE*2, ob.y-ob.h*0.5, TILE, TILE*2, PAL.cactus);
      px(ob.x+TILE, ob.y-ob.h*0.5-TILE*2, TILE*2, TILE, PAL.cactus);
      // 밝은 면
      px(ob.x+TILE, ob.y-ob.h, TILE*0.5, ob.h, PAL.cactus2);
    } else if (ob.type === 'rock') {
      // 돌
      px(ob.x+TILE*0.5, ob.y-ob.h, ob.w-TILE, ob.h*0.5, PAL.rock2);
      px(ob.x, ob.y-ob.h*0.5, ob.w, ob.h*0.5, PAL.rock);
      px(ob.x, ob.y-ob.h, TILE*0.5, ob.h, PAL.rock3);
    }
  }
}

function drawBirds() {
  for (const b of birds) {
    const bx = Math.floor(b.x), by = Math.floor(b.y);
    // 몸통
    px(bx+TILE, by, TILE, TILE, PAL.bird1);
    // 날개
    px(bx, by-b.wing*0.5, TILE, TILE*0.5, PAL.bird2);
    px(bx+TILE*2, by-b.wing*0.5, TILE, TILE*0.5, PAL.bird2);
    // 눈
    px(bx+TILE+TILE*0.75, by+TILE*0.25, TILE*0.25, TILE*0.25, '#fff');
  }
}

function drawCoins() {
  for (const co of coinObjs) {
    if (co.collected) continue;
    const cy = co.y + Math.sin(co.bobT) * 4;
    const cx = Math.floor(co.x), ccy = Math.floor(cy);
    // 코인 픽셀
    px(cx+TILE*0.25, ccy-TILE, TILE*0.5, TILE*1.5, PAL.coinDark);
    px(cx, ccy-TILE*0.75, TILE, TILE, PAL.coin);
    px(cx+TILE*0.25, ccy-TILE*0.5, TILE*0.5, TILE*0.5, PAL.coinShine);
    // 반짝임
    if (Math.sin(co.bobT*2+frame*0.1) > 0.7) {
      px(cx+TILE*0.75, ccy-TILE*1.1, TILE*0.25, TILE*0.25, '#fff');
    }
  }
}

function drawPlayer() {
  if (P.dead && frame % 4 < 2) return;
  const px2 = Math.floor(P.x);
  const py2 = Math.floor(P.y);
  const run = Math.floor(P.runT / 3) % 4;

  ctx.globalAlpha = P.invincible > 0 && frame%4<2 ? 0.4 : 1;

  if (P.sliding) {
    // 슬라이드 자세 (납작)
    px(px2, py2-TILE*1.5, TILE*3, TILE, PAL.heroHair);
    px(px2, py2-TILE*0.5, TILE*3, TILE*0.5, PAL.heroShirt);
    px(px2+TILE*2.5, py2-TILE*1.5, TILE*0.5, TILE*0.5, PAL.heroSkin);
    return;
  }

  // 머리
  px(px2+TILE*0.5, py2-TILE*4, TILE*1.5, TILE, PAL.heroHair);
  px(px2+TILE*0.5, py2-TILE*3, TILE*1.5, TILE*1.5, PAL.heroSkin);
  // 눈
  px(px2+TILE*0.75, py2-TILE*2.75, TILE*0.25, TILE*0.25, '#333');
  px(px2+TILE*1.5,  py2-TILE*2.75, TILE*0.25, TILE*0.25, '#333');
  // 몸 (셔츠)
  px(px2+TILE*0.5, py2-TILE*1.5, TILE*1.5, TILE*1.5, PAL.heroShirt);
  // 망토 (포인트)
  px(px2, py2-TILE*1.5, TILE*0.5, TILE*1.5, '#cc2244');
  // 팔
  const armR = run<2 ? -TILE*0.5 : 0;
  px(px2, py2-TILE*1.5+armR, TILE*0.5, TILE, PAL.heroSkin);
  px(px2+TILE*2, py2-TILE*1.5-armR, TILE*0.5, TILE, PAL.heroSkin);
  // 검 (오른손)
  px(px2+TILE*2.5, py2-TILE*2.5-armR, TILE*0.25, TILE*1.5, PAL.heroSword);
  px(px2+TILE*2, py2-TILE*2-armR, TILE, TILE*0.25, PAL.heroShield);
  // 바지/다리
  px(px2+TILE*0.5, py2, py2, TILE*0, 0); // reset
  if (run === 0 || run === 2) {
    px(px2+TILE*0.5, py2-TILE, TILE*0.5, TILE, PAL.heroPants);
    px(px2+TILE,     py2-TILE, TILE*0.5, TILE, PAL.heroPants);
    px(px2+TILE*0.5, py2,      TILE*0.5, TILE*0.5, PAL.heroBoots);
    px(px2+TILE,     py2,      TILE*0.5, TILE*0.5, PAL.heroBoots);
  } else if (run === 1) {
    px(px2+TILE*0.5, py2-TILE, TILE*0.5, TILE*1.5, PAL.heroPants);
    px(px2+TILE,     py2-TILE*0.5, TILE*0.5, TILE, PAL.heroPants);
    px(px2+TILE*0.5, py2+TILE*0.5, TILE*0.5, TILE*0.5, PAL.heroBoots);
    px(px2+TILE,     py2,           TILE*0.5, TILE*0.5, PAL.heroBoots);
  } else {
    px(px2+TILE*0.5, py2-TILE*0.5, TILE*0.5, TILE, PAL.heroPants);
    px(px2+TILE,     py2-TILE,     TILE*0.5, TILE*1.5, PAL.heroPants);
    px(px2+TILE*0.5, py2,           TILE*0.5, TILE*0.5, PAL.heroBoots);
    px(px2+TILE,     py2+TILE*0.5,  TILE*0.5, TILE*0.5, PAL.heroBoots);
  }

  // 점프 중 포즈
  if (P.jumping) {
    ctx.clearRect(px2, Math.floor(P.y)-TILE*4, TILE*3+4, TILE*4);
    // 다시 그리기 (다리 뻗음)
    px(px2+TILE*0.5, py2-TILE*4, TILE*1.5, TILE, PAL.heroHair);
    px(px2+TILE*0.5, py2-TILE*3, TILE*1.5, TILE*1.5, PAL.heroSkin);
    px(px2+TILE*0.75, py2-TILE*2.75, TILE*0.25, TILE*0.25, '#333');
    px(px2+TILE*1.5,  py2-TILE*2.75, TILE*0.25, TILE*0.25, '#333');
    px(px2+TILE*0.5, py2-TILE*1.5, TILE*1.5, TILE*1.5, PAL.heroShirt);
    px(px2, py2-TILE*1.5, TILE*0.5, TILE*1.5, '#cc2244');
    px(px2-TILE*0.5, py2-TILE*2, TILE*0.5, TILE, PAL.heroSkin);
    px(px2+TILE*2,   py2-TILE*2, TILE*0.5, TILE, PAL.heroSkin);
    px(px2+TILE*2.5, py2-TILE*2.5, TILE*0.25, TILE*1.5, PAL.heroSword);
    // 다리 뻗음
    px(px2+TILE*0.25, py2-TILE*0.5, TILE*0.75, TILE*0.5, PAL.heroPants);
    px(px2+TILE, py2-TILE*0.5, TILE*0.75, TILE*0.5, PAL.heroPants);
    px(px2, py2,           TILE*0.5, TILE*0.5, PAL.heroBoots);
    px(px2+TILE*1.75, py2, TILE*0.5, TILE*0.5, PAL.heroBoots);
  }

  ctx.globalAlpha = 1;
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function drawHUD() {
  // 점수
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 13px "Courier New"';
  ctx.textAlign = 'right';
  ctx.fillText(`${Math.floor(score)} m`, W-12, 22);

  // 코인 UI
  // 코인 아이콘
  ctx.fillStyle = PAL.coin;
  ctx.fillRect(12, 10, TILE, TILE);
  ctx.fillStyle = PAL.coinShine;
  ctx.fillRect(14, 11, 4, 4);
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'left';
  ctx.fillText(`× ${coins}`, 24, 22);

  // 속도 표시 (별 아이콘)
  if (speed > 5) {
    ctx.fillStyle = '#ffe566';
    ctx.font = 'bold 10px "Courier New"';
    ctx.textAlign = 'center';
    ctx.fillText('★ FAST', W/2, 16);
  }
  if (speed > 7) {
    ctx.fillStyle = '#ff6b6b';
    ctx.fillText('★★ FASTER', W/2, 16);
  }
}

function drawScanline() {
  // CRT 스캔라인 효과 (가볍게)
  ctx.fillStyle = 'rgba(0,0,0,0.03)';
  for (let y = 0; y < H; y += 2) ctx.fillRect(0, y, W, 1);
}

// ── 메인 루프 ──
function loop() {
  requestAnimationFrame(loop);
  ctx.clearRect(0, 0, W, H);

  drawSky();
  drawClouds();
  drawGround();

  if (state === 'playing' || state === 'dead') {
    if (state === 'playing') update();
    else {
      // 죽은 후 파티클만 계속
      for (let i = particles.length-1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= 0.04;
        if (p.life <= 0) particles.splice(i, 1);
      }
    }
    drawObstacles();
    drawBirds();
    drawCoins();
    drawPlayer();
    drawParticles();
    drawHUD();
    drawScanline();
  }
}

// 최고 기록 초기화
document.getElementById('bestVal').textContent = best;
requestAnimationFrame(loop);
</script>
